# C4 Bash Security Hook Configuration
# =====================================
#
# DEPRECATED: This file is no longer the primary configuration source.
# The hook now reads .c4/hook-config.json (generated by the MCP server on startup)
# as the SSOT. This file is only used as a fallback when .c4/hook-config.json
# does not exist.
#
# To configure the hook, edit .c4/config.yaml (permission_reviewer section).
# The MCP server will regenerate .c4/hook-config.json on next startup.
#
# ─────────────────────────────────────────────────────────────────────────────
# Legacy settings (used as fallback only):
# ─────────────────────────────────────────────────────────────────────────────
#
# PERMISSION_MODE: 감독 방식 선택
#   "model"  — Haiku API로 각 명령어 평가 (기본값)
#              API 실패 시 hook 패턴으로 자동 폴백
#   "hook"   — 정규식 패턴 매칭만 사용 (오프라인/빠름)
#
PERMISSION_MODE="model"

# AUTO_APPROVE: 안전 판정 시 자동 승인 여부
#   "true"   — 안전한 명령은 permission prompt 없이 자동 실행 (기본값)
#   "false"  — 위험한 명령만 차단, 나머지는 Claude Code 기본 flow (사용자 확인)
#
AUTO_APPROVE="true"

# SUPERVISOR_MODEL: model 모드에서 사용할 Claude 모델
SUPERVISOR_MODEL="claude-haiku-4-5-20251001"

# ALLOW_PATTERNS: 화이트리스트 (모든 모드에서 우선 적용)
ALLOW_PATTERNS=(
    # "rm -rf /tmp/mytest"
    # "npm publish --dry-run"
)

# BLOCK_PATTERNS: 추가 차단 패턴 (hook 모드 및 model 폴백 시 적용)
BLOCK_PATTERNS=(
    # "docker rm"
    # "kubectl delete"
)
