syntax = "proto3";
package eventbus;
option go_package = "github.com/changmin/c4-core/internal/eventbus/pb";

service EventBus {
  rpc Publish(Event) returns (PublishResponse);
  rpc Subscribe(SubscribeRequest) returns (stream Event);
  rpc ListEvents(ListEventsRequest) returns (ListEventsResponse);
  rpc AddRule(Rule) returns (RuleResponse);
  rpc ListRules(ListRulesRequest) returns (ListRulesResponse);
  rpc RemoveRule(RemoveRuleRequest) returns (RuleResponse);
  rpc ToggleRule(ToggleRuleRequest) returns (RuleResponse);       // v3: Step 1
  rpc ListLogs(ListLogsRequest) returns (ListLogsResponse);       // v3: Step 3
  rpc GetStats(GetStatsRequest) returns (GetStatsResponse);       // v3: Step 4
  rpc ReplayEvents(ReplayRequest) returns (stream Event);         // v3: Step 8
}

message Event {
  string id = 1;
  string type = 2;          // e.g. "drive.uploaded", "task.completed"
  string source = 3;        // e.g. "c4.drive", "c4.core"
  bytes  data = 4;          // JSON payload
  string project_id = 5;
  int64  timestamp_ms = 6;
}

message PublishResponse {
  string event_id = 1;
  bool   ok = 2;
}

message SubscribeRequest {
  string event_pattern = 1; // "drive.*" or "drive.uploaded"
  string project_id = 2;    // optional project filter
}

message ListEventsRequest {
  string type = 1;
  int32  limit = 2;
  int64  since_ms = 3;
}

message ListEventsResponse {
  repeated Event events = 1;
  int32 total = 2;
}

message Rule {
  string id = 1;
  string name = 2;
  string event_pattern = 3;   // "drive.uploaded"
  string filter_json = 4;     // e.g. {"content_type": "application/pdf"}
  string action_type = 5;     // "rpc", "webhook", "log"
  string action_config = 6;   // JSON: action-specific config
  bool   enabled = 7;
  int32  priority = 8;
}

message RuleResponse {
  string rule_id = 1;
  bool   ok = 2;
}

message ListRulesRequest {}

message ListRulesResponse {
  repeated Rule rules = 1;
}

message RemoveRuleRequest {
  string id = 1;
  string name = 2;  // alternative: remove by name
}

// v3: ToggleRule (Step 1)
message ToggleRuleRequest {
  string name = 1;
  bool   enabled = 2;
}

// v3: ListLogs audit trail (Step 3)
message LogEntry {
  int64  id = 1;
  string event_id = 2;
  string rule_name = 3;
  string event_type = 4;
  string status = 5;
  string error = 6;
  int64  duration_ms = 7;
  int64  timestamp_ms = 8;
}

message ListLogsRequest {
  string event_id = 1;     // optional: filter by event
  int32  limit = 2;        // default: 50
  int64  since_ms = 3;     // optional: only logs after this timestamp
  string event_type = 4;   // optional: filter by event type
}

message ListLogsResponse {
  repeated LogEntry logs = 1;
  int32 total = 2;
}

// v3: GetStats (Step 4)
message GetStatsRequest {}

message GetStatsResponse {
  int32  event_count = 1;
  int32  rule_count = 2;
  int32  log_count = 3;
  string oldest_event = 4;
  string newest_event = 5;
}

// v3: ReplayEvents (Step 8)
message ReplayRequest {
  string event_type = 1;   // optional: filter by type
  int64  since_ms = 2;     // optional: only events after this time
  int32  limit = 3;        // max events to replay (default: 100)
  bool   dry_run = 4;      // if true, stream events without re-dispatching
}
