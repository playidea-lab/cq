# C3 EventBus — Default Rules
# These rules are loaded when the EventBus daemon starts for the first time.
# Modify via c4_rule_add / c4_rule_remove MCP tools or gRPC API.

rules:
  - name: log-all-events
    event_pattern: "*"
    action_type: log
    enabled: false          # Debug only — enable manually
    priority: 999

  - name: c1-task-updates
    event_pattern: "task.*"
    action_type: c1_post
    action_config: '{"channel":"#updates","template":"[{{event_type}}] {{task_id}}: {{title}}"}'
    enabled: true
    priority: 50

  - name: c1-drive-events
    event_pattern: "drive.*"
    action_type: c1_post
    action_config: '{"channel":"#drive","template":"[drive] {{event_type}}: {{path}}"}'
    enabled: true
    priority: 50

  - name: c1-research-events
    event_pattern: "research.*"
    action_type: c1_post
    action_config: '{"channel":"#research","template":"[research] {{event_type}}"}'
    enabled: false         # No research.* events published yet — enable when ready
    priority: 50

  - name: c1-checkpoint-events
    event_pattern: "checkpoint.*"
    action_type: c1_post
    action_config: '{"channel":"#updates","template":"[checkpoint] {{decision}}: {{checkpoint_id}}"}'
    enabled: true
    priority: 50

  - name: c1-validation-events
    event_pattern: "validation.*"
    action_type: c1_post
    action_config: '{"channel":"#updates","template":"[validation] {{event_type}}: {{name}}"}'
    enabled: true
    priority: 50
