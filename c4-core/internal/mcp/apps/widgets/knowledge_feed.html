<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Knowledge Feed</title>
<style>
  :root {
    --bg: #ffffff;
    --surface: #f5f5f5;
    --border: #e0e0e0;
    --text: #1a1a1a;
    --text-secondary: #666666;
    --accent: #2563eb;
    --success: #16a34a;
    --warning: #d97706;
    --error: #dc2626;
    --radius: 6px;
    --gap: 8px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --border: #2a2a2a;
      --text: #f0f0f0;
      --text-secondary: #888888;
      --accent: #3b82f6;
      --success: #22c55e;
      --warning: #f59e0b;
      --error: #ef4444;
    }
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 12px;
    background: var(--bg);
    color: var(--text);
    padding: 8px;
    display: flex;
    flex-direction: column;
    gap: var(--gap);
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .header-title {
    font-weight: 600;
    font-size: 13px;
    letter-spacing: -0.01em;
  }

  .header-meta {
    font-size: 10px;
    color: var(--text-secondary);
  }

  .empty-state {
    text-align: center;
    color: var(--text-secondary);
    font-size: 11px;
    padding: 16px 4px;
  }

  .feed {
    display: flex;
    flex-direction: column;
    gap: 6px;
    overflow-y: auto;
    flex: 1;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: var(--gap);
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .card-header {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .card-title {
    font-weight: 600;
    font-size: 12px;
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .type-tag {
    font-size: 9px;
    font-weight: 700;
    padding: 1px 5px;
    border-radius: 3px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    flex-shrink: 0;
  }

  .type-tag.experiment  { background: #dbeafe; color: #1d4ed8; }
  .type-tag.pattern     { background: #dcfce7; color: #15803d; }
  .type-tag.insight     { background: #fef9c3; color: #854d0e; }
  .type-tag.hypothesis  { background: #fce7f3; color: #9d174d; }
  .type-tag.default     { background: var(--border); color: var(--text-secondary); }

  @media (prefers-color-scheme: dark) {
    .type-tag.experiment  { background: #1e3a5f; color: #93c5fd; }
    .type-tag.pattern     { background: #14532d; color: #86efac; }
    .type-tag.insight     { background: #451a03; color: #fcd34d; }
    .type-tag.hypothesis  { background: #4a044e; color: #f0abfc; }
  }

  .card-meta {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 10px;
    color: var(--text-secondary);
  }

  .score-bar-wrap {
    display: flex;
    align-items: center;
    gap: 4px;
    flex: 1;
  }

  .score-bar-bg {
    flex: 1;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .score-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.3s;
  }

  .score-label {
    font-size: 9px;
    font-weight: 600;
    color: var(--accent);
    flex-shrink: 0;
    min-width: 30px;
    text-align: right;
  }

  .domain-label {
    font-size: 10px;
    color: var(--text-secondary);
    flex-shrink: 0;
  }

  .summary {
    font-size: 11px;
    color: var(--text-secondary);
    line-height: 1.4;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }
</style>
</head>
<body>
<div class="header">
  <span class="header-title" id="query-label">Knowledge Feed</span>
  <span class="header-meta" id="count-label"></span>
</div>
<div id="empty-state" class="empty-state">No results</div>
<div id="feed" class="feed" style="display:none"></div>

<script>
(function () {
  'use strict';

  var els = {
    queryLabel: document.getElementById('query-label'),
    countLabel: document.getElementById('count-label'),
    emptyState: document.getElementById('empty-state'),
    feed: document.getElementById('feed'),
  };

  function esc(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function typeClass(t) {
    var known = ['experiment', 'pattern', 'insight', 'hypothesis'];
    return known.indexOf(t) !== -1 ? t : 'default';
  }

  function formatScore(score) {
    if (typeof score !== 'number' || score <= 0) return null;
    // rrf_score is typically 0..1 (RRF rank reciprocal) — clamp to 0-100%
    var pct = Math.min(100, Math.round(score * 1000) / 10);
    return pct;
  }

  function renderResults(data) {
    if (!data || typeof data !== 'object') {
      showEmpty();
      return;
    }

    var results = data.results;
    if (!Array.isArray(results) || results.length === 0) {
      showEmpty();
      return;
    }

    if (data.query) {
      els.queryLabel.textContent = '\u201c' + data.query + '\u201d';
    }
    var total = data.count || results.length;
    els.countLabel.textContent = total + ' result' + (total !== 1 ? 's' : '');

    var html = '';
    results.forEach(function (r) {
      if (!r || typeof r !== 'object') return;

      var title = r.title || r.id || '(untitled)';
      var docType = r.type || '';
      var domain = r.domain || '';
      var summary = r.summary || r.content_preview || '';
      var scoreVal = formatScore(r.rrf_score);
      var source = r.source || '';

      html += '<div class="card">';
      html += '<div class="card-header">';
      html += '<span class="card-title">' + esc(title) + '</span>';
      if (docType) {
        html += '<span class="type-tag ' + esc(typeClass(docType)) + '">' + esc(docType) + '</span>';
      }
      html += '</div>';

      // Score bar + domain
      html += '<div class="card-meta">';
      if (scoreVal !== null) {
        html += '<div class="score-bar-wrap">';
        html += '<div class="score-bar-bg"><div class="score-bar-fill" style="width:' + scoreVal + '%"></div></div>';
        html += '<span class="score-label">' + scoreVal.toFixed(1) + '</span>';
        html += '</div>';
      }
      if (domain) {
        html += '<span class="domain-label">' + esc(domain) + '</span>';
      }
      if (source && source !== 'local') {
        html += '<span class="domain-label">[' + esc(source) + ']</span>';
      }
      html += '</div>';

      if (summary) {
        html += '<div class="summary">' + esc(summary) + '</div>';
      }

      html += '</div>';
    });

    els.feed.innerHTML = html;
    els.emptyState.style.display = 'none';
    els.feed.style.display = '';
  }

  function showEmpty() {
    els.emptyState.style.display = '';
    els.feed.style.display = 'none';
    els.feed.innerHTML = '';
  }

  window.addEventListener('message', function (event) {
    var msg = event.data;
    if (!msg || typeof msg !== 'object') return;

    if (msg.type === 'cq:knowledge-feed:data') {
      renderResults(msg.payload);
    } else if (msg.type === 'cq:knowledge-feed:clear') {
      showEmpty();
    }
  });

  // Initial empty state
  showEmpty();
})();
</script>
</body>
</html>
