<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Experiment Compare</title>
<style>
  :root {
    --bg: #ffffff;
    --surface: #f5f5f5;
    --border: #e0e0e0;
    --text: #1a1a1a;
    --text-secondary: #666666;
    --accent: #2563eb;
    --success: #16a34a;
    --warning: #d97706;
    --error: #dc2626;
    --gold: #ca8a04;
    --radius: 6px;
    --gap: 8px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --border: #2a2a2a;
      --text: #f0f0f0;
      --text-secondary: #888888;
      --accent: #3b82f6;
      --success: #22c55e;
      --warning: #f59e0b;
      --error: #ef4444;
      --gold: #eab308;
    }
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 12px;
    background: var(--bg);
    color: var(--text);
    padding: 8px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: var(--gap);
    display: flex;
    flex-direction: column;
    gap: var(--gap);
    overflow: hidden;
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .header-title {
    font-weight: 600;
    font-size: 13px;
    letter-spacing: -0.01em;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1;
  }

  .count-badge {
    font-size: 10px;
    font-weight: 600;
    padding: 2px 6px;
    border-radius: 3px;
    background: var(--accent);
    color: #fff;
    flex-shrink: 0;
    margin-left: 6px;
  }

  .empty-state {
    text-align: center;
    color: var(--text-secondary);
    font-size: 11px;
    padding: 12px 4px;
  }

  .compare-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 11px;
  }

  .compare-table th {
    text-align: left;
    font-size: 10px;
    font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding: 4px 6px;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }

  .compare-table td {
    padding: 4px 6px;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
  }

  .compare-table tr:last-child td {
    border-bottom: none;
  }

  .compare-table tr.best-row {
    background: color-mix(in srgb, var(--gold) 10%, transparent);
  }

  .exp-id {
    font-weight: 600;
    color: var(--accent);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 100px;
    display: inline-block;
  }

  .exp-title {
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 150px;
    display: inline-block;
  }

  .metric-val {
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }

  .delta {
    font-size: 10px;
    font-weight: 500;
    margin-left: 2px;
  }

  .delta.positive {
    color: var(--success);
  }

  .delta.negative {
    color: var(--error);
  }

  .delta.neutral {
    color: var(--text-secondary);
  }

  .best-label {
    font-size: 9px;
    font-weight: 700;
    color: var(--gold);
    margin-left: 4px;
  }

  .source-badge {
    font-size: 9px;
    padding: 1px 4px;
    border-radius: 2px;
    background: var(--border);
    color: var(--text-secondary);
  }

  .source-badge.community {
    background: color-mix(in srgb, var(--accent) 20%, transparent);
    color: var(--accent);
  }
</style>
</head>
<body>
<div class="card" id="compare-card">
  <div id="empty-state" class="empty-state">No experiments to compare</div>
  <div id="compare-content" style="display:none">
    <div class="header">
      <span class="header-title" id="query-title">Experiment Compare</span>
      <span class="count-badge" id="count-badge">0</span>
    </div>
    <div style="overflow-x:auto">
      <table class="compare-table" id="compare-table">
        <thead id="table-head"></thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
(function () {
  'use strict';

  var els = {
    empty: document.getElementById('empty-state'),
    content: document.getElementById('compare-content'),
    queryTitle: document.getElementById('query-title'),
    countBadge: document.getElementById('count-badge'),
    tableHead: document.getElementById('table-head'),
    tableBody: document.getElementById('table-body'),
  };

  function esc(s) {
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function formatMetricValue(val) {
    if (typeof val === 'number') {
      if (Number.isInteger(val)) return String(val);
      return val.toFixed(4);
    }
    return String(val);
  }

  function formatDelta(delta) {
    if (typeof delta !== 'number') return null;
    var sign = delta > 0 ? '+' : '';
    if (Number.isInteger(delta)) return sign + delta;
    return sign + delta.toFixed(4);
  }

  function collectMetricKeys(experiments) {
    var keySet = {};
    var keys = [];
    experiments.forEach(function (exp) {
      var metrics = exp.metrics || {};
      Object.keys(metrics).forEach(function (k) {
        if (!keySet[k]) {
          keySet[k] = true;
          keys.push(k);
        }
      });
    });
    return keys;
  }

  function findBestIndex(experiments, metricKeys) {
    if (experiments.length === 0 || metricKeys.length === 0) return -1;
    for (var i = 0; i < experiments.length; i++) {
      if (experiments[i].is_best) return i;
    }
    return -1;
  }

  function renderCompare(data) {
    if (!data || typeof data !== 'object') {
      els.empty.style.display = '';
      els.content.style.display = 'none';
      return;
    }

    var experiments = data.experiments || data.results || [];
    if (!Array.isArray(experiments) || experiments.length === 0) {
      els.empty.style.display = '';
      els.content.style.display = 'none';
      return;
    }

    els.empty.style.display = 'none';
    els.content.style.display = '';

    var query = data.query || 'Experiment Compare';
    els.queryTitle.textContent = query;
    els.countBadge.textContent = String(experiments.length);

    var metricKeys = collectMetricKeys(experiments);
    var bestIdx = findBestIndex(experiments, metricKeys);

    // Build header
    var headHtml = '<tr><th>ID</th><th>Title</th>';
    metricKeys.forEach(function (k) {
      headHtml += '<th>' + esc(k) + '</th>';
    });
    if (experiments[0] && experiments[0].source !== undefined) {
      headHtml += '<th>Source</th>';
    }
    headHtml += '</tr>';
    els.tableHead.innerHTML = headHtml;

    // Build rows
    var bodyHtml = '';
    experiments.forEach(function (exp, idx) {
      var rowClass = idx === bestIdx ? ' class="best-row"' : '';
      bodyHtml += '<tr' + rowClass + '>';

      // ID column
      var id = exp.id || exp.exp_id || '--';
      bodyHtml += '<td><span class="exp-id">' + esc(id) + '</span>';
      if (idx === bestIdx) {
        bodyHtml += '<span class="best-label">BEST</span>';
      }
      bodyHtml += '</td>';

      // Title column
      var title = exp.title || exp.name || '--';
      bodyHtml += '<td><span class="exp-title">' + esc(title) + '</span></td>';

      // Metric columns
      var metrics = exp.metrics || {};
      var deltas = exp.deltas || {};
      metricKeys.forEach(function (k) {
        var val = metrics[k];
        bodyHtml += '<td>';
        if (val !== undefined && val !== null) {
          bodyHtml += '<span class="metric-val">' + esc(formatMetricValue(val)) + '</span>';
          var delta = deltas[k];
          if (delta !== undefined && delta !== null) {
            var formatted = formatDelta(delta);
            if (formatted !== null) {
              var cls = delta > 0 ? 'positive' : (delta < 0 ? 'negative' : 'neutral');
              bodyHtml += '<span class="delta ' + cls + '">' + esc(formatted) + '</span>';
            }
          }
        } else {
          bodyHtml += '<span class="metric-val" style="color:var(--text-secondary)">--</span>';
        }
        bodyHtml += '</td>';
      });

      // Source column
      if (exp.source !== undefined) {
        var srcClass = exp.source === 'community' ? ' community' : '';
        bodyHtml += '<td><span class="source-badge' + srcClass + '">' + esc(exp.source) + '</span></td>';
      }

      bodyHtml += '</tr>';
    });
    els.tableBody.innerHTML = bodyHtml;
  }

  window.addEventListener('message', function (event) {
    var msg = event.data;
    if (!msg || typeof msg !== 'object') return;

    if (msg.type === 'cq:experiment-compare:data') {
      renderCompare(msg.payload);
    } else if (msg.type === 'cq:experiment-compare:clear') {
      renderCompare(null);
    }
  });

  // Initial empty state
  renderCompare(null);
})();
</script>
</body>
</html>
