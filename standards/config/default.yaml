# CQ 기본 설정 — piki 회사 표준
# 프로젝트별 오버라이드: .c4/config.yaml에서 직접 수정

project_id: ""  # cq init 시 자동 설정
domain: ""      # cq init --team 시 자동 설정
default_branch: main

economic_mode:
  enabled: true
  preset: standard

observe:
  enabled: true
  log_level: info
  log_format: text

validation:
  # 언어 자동 감지 후 적용 (cq init --lang)
  # go:
  #   lint: "go vet ./..."
  #   unit: "go test ./..."
  # python:
  #   lint: "uv run ruff check ."
  #   unit: "uv run pytest tests/unit/ -v"
  # typescript:
  #   lint: "pnpm lint"
  #   unit: "pnpm test"

permission_reviewer:
  enabled: true
  mode: hook
  auto_approve: true
  allow_patterns:
    - "^git (log|show|diff|status|branch|tag|remote|stash list|ls-files|blame)( |$)"
    - "^git (add|commit|checkout|worktree|merge|rebase|stash|fetch|pull)( |$)"
    - "^go (build|test|vet|run|env|list|mod)( |$)"
    - "^cd .* && go (build|test|vet)( |$)"
    - "^uv (run|sync|pip list|pip show|lock|python)( |$)"
    - "^(ls|ll|la|cat|head|tail|wc|stat) "
    - "^ls$"
    - "^(mkdir|touch|cp|mv|chmod) "
    - "^find \\. "
    - "^(grep|rg) "
    - "^(echo|pwd|which|env|printenv|whoami|date|uname) "
    - "^(test|\\[) "
    - "^cq "
    - "^sqlite3 "
    - "^(cargo|rustc) (build|test|check|clippy)( |$)"
    - "^pnpm (build|test|lint|install|dev)( |$)"
    - "^make (build|install|test)( |$)"
  block_patterns: []
