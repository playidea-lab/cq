# 적용 순서 (우선순위: 높은 번호가 낮은 번호를 오버라이드)
# 1. common (항상)
# 2. languages (--lang)
# 3. teams (--team)
# 4. local-*.md (프로젝트 고유, piki가 관리하지 않음)

# cq doctor 설정
doctor:
  check_version: true       # piki 버전과 로컬 규칙 버전 비교
  check_gitignore:           # .gitignore 필수 패턴 확인
    - .env
    - .env.*
    - "*.pem"
    - "*.key"
    - credentials.json
  check_files:               # 필수 파일 존재 확인
    - CLAUDE.md
    - .gitignore
