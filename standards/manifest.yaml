# piki manifest — cq init 연동 설정
# cq init --team <team> --lang <lang> 실행 시 이 파일을 참조하여
# 어떤 파일을 프로젝트에 복사할지 결정합니다.

version: 1
source: https://git.pilab.co.kr/pi/piki

# 항상 적용되는 레이어
common:
  rules:
    - rules/common/security.md
    - rules/common/git-workflow.md
    - rules/common/review-criteria.md
    - rules/common/testing.md
  hooks:
    - src: hooks/bash-security.sh
      dst: .claude/hooks/bash-security.sh
      executable: true
    - src: hooks/stop-guard.sh
      dst: .claude/hooks/stop-guard.sh
      executable: true
    - src: hooks/session-start.sh
      dst: .claude/hooks/session-start.sh
      executable: true
  files:
    - src: agents.md
      dst: CLAUDE.md
      merge: true          # 기존 CLAUDE.md가 있으면 병합
    - src: soul.md
      dst: .claude/rules/soul.md
    - src: settings/default.json
      dst: .claude/settings.json
      overwrite: false      # 이미 있으면 스킵
    - src: config/default.yaml
      dst: .c4/config.yaml
      overwrite: false

# 언어별 레이어 (--lang 으로 선택)
languages:
  go:
    rules:
      - rules/go/style.md
    validation:
      lint: "go vet ./..."
      build: "go build ./..."
      unit: "go test ./..."
    scaffold:
      dirs:
        - cmd
        - internal
        - test
      files:
        - go.mod

  python:
    rules:
      - rules/python/style.md
    validation:
      lint: "uv run ruff check ."
      format: "uv run ruff format --check ."
      unit: "uv run pytest tests/unit/ -v"
    scaffold:
      dirs:
        - src
        - tests/unit
        - tests/integration
      files:
        - pyproject.toml

  ts:
    aliases: [typescript]
    rules:
      - rules/typescript/style.md
    validation:
      lint: "pnpm lint"
      build: "pnpm build"
      unit: "pnpm test"
    scaffold:
      dirs:
        - src/components
        - src/hooks
        - src/utils
        - src/types
      files:
        - package.json
        - tsconfig.json

# 팀별 레이어 (--team 으로 선택)
teams:
  backend:
    rules:
      - teams/backend/rules/backend.md
    default_langs: [go]
    domain: backend
    skills: [api-design, db-design, migration, deploy, security-audit, perf-audit, mcp-builder]

  frontend:
    rules:
      - teams/frontend/rules/frontend.md
    default_langs: [ts]
    domain: frontend
    skills: [component-design, a11y-audit, webapp-testing, feature-dev, perf-audit]

  infra:
    rules:
      - teams/infra/rules/infra.md
    default_langs: [go, python]
    domain: infra
    skills: [deploy, migration, data-pipeline, hookify, mcp-builder]

  mlops:
    rules:
      - teams/mlops/rules/mlops.md
    default_langs: [python]
    domain: mlops
    skills: [experiment-design, model-serving, data-pipeline, deploy]

  research:
    rules:
      - teams/research/rules/research.md
    default_langs: [python]
    domain: research
    skills: [paper-review, paper-writing, experiment-design]

  security:
    rules:
      - teams/security/rules/security-team.md
    default_langs: []
    domain: security
    skills: [security-audit]

  pm:
    rules:
      - teams/pm/rules/pm.md
    default_langs: []
    domain: pm
    skills: [proposal-writer, document-review, meeting-notes, internal-comms, estimation]

  qa:
    rules:
      - teams/qa/rules/qa.md
    default_langs: []
    domain: qa
    skills: [webapp-testing, perf-audit]

  ops:
    rules:
      - teams/ops/rules/ops.md
    default_langs: [go, python]
    domain: ops
    skills: [incident-response, postmortem, deploy, internal-comms]

# Skills — cq init 시 프로젝트에 복사 가능한 스킬
