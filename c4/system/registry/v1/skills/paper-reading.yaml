skill:
  id: paper-reading
  name: "Paper Reading & Analysis"
  description: "학술 논문 분석, 핵심 기여 추출, 방법론 평가, 관련 연구 매핑"

  impact: high
  category: data-processing
  domains:
    - research

  metadata:
    version: "1.0.0"
    author: "c4-team"
    license: MIT
    tags: [paper, reading, analysis, literature-review, research]

  capabilities:
    - paper-summarization
    - methodology-analysis
    - contribution-extraction
    - related-work-mapping
    - limitation-identification

  triggers:
    keywords:
      - paper
      - read
      - analyze
      - survey
      - literature
      - review
      - arxiv
      - citation
    task_types:
      - paper-reading
      - literature-review
      - survey
    file_patterns:
      - "**/*.pdf"
      - "**/papers/**"

  rules:
    - id: PR-001
      description: "논문 분석은 구조화된 형식으로 출력 (Contribution, Method, Results, Limitations)"
      impact: high

    - id: PR-002
      description: "핵심 주장은 반드시 실험 결과로 뒷받침되는지 확인"
      impact: high

    - id: PR-003
      description: "관련 연구와의 차별점을 명확히 정리"
      impact: medium

  tools:
    - pdf-reader
    - citation-manager

  complementary_skills:
    - knowledge-extraction
    - paper-writing

  prerequisites:
    - domain-knowledge

  leads_to:
    - paper-reviewing
    - paper-writing
    - knowledge-extraction
