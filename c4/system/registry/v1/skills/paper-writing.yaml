skill:
  id: paper-writing
  name: "Paper Writing & Drafting"
  description: "학술 논문 작성, 구조 설계, 논리 전개, 실험 결과 정리, 투고 준비"

  impact: high
  category: quality
  domains:
    - research

  metadata:
    version: "1.0.0"
    author: "c4-team"
    license: MIT
    tags: [paper, writing, drafting, academic, latex, submission]

  capabilities:
    - paper-structuring
    - argument-construction
    - experiment-reporting
    - figure-design
    - submission-preparation

  triggers:
    keywords:
      - write
      - draft
      - paper
      - manuscript
      - latex
      - overleaf
      - submission
    task_types:
      - paper-writing
      - drafting
      - revision
    file_patterns:
      - "**/*.tex"
      - "**/*.bib"
      - "**/paper/**"

  rules:
    - id: PW-001
      description: "논문 구조는 표준 형식 준수 (Abstract, Intro, Related Work, Method, Experiments, Conclusion)"
      impact: high

    - id: PW-002
      description: "모든 주장은 실험 데이터 또는 인용으로 뒷받침"
      impact: critical

    - id: PW-003
      description: "Figure와 Table은 self-contained (캡션만으로 이해 가능)"
      impact: medium

  tools:
    - latex
    - bibtex
    - overleaf

  complementary_skills:
    - paper-reading
    - paper-reviewing

  prerequisites:
    - paper-reading
    - domain-knowledge

  leads_to:
    - paper-reviewing
