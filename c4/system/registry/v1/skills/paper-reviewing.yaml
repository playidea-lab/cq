skill:
  id: paper-reviewing
  name: "Paper Reviewing & Peer Review"
  description: "학술 논문 피어 리뷰, 재현성 검증, 방법론 비판, 개선 제안"

  impact: critical
  category: quality
  domains:
    - research

  metadata:
    version: "1.0.0"
    author: "c4-team"
    license: MIT
    tags: [paper, review, peer-review, reproducibility, methodology]

  capabilities:
    - methodology-critique
    - reproducibility-assessment
    - statistical-validation
    - novelty-evaluation
    - constructive-feedback

  triggers:
    keywords:
      - review
      - peer
      - critique
      - rebuttal
      - revision
      - reproducibility
      - ablation
    task_types:
      - paper-review
      - peer-review
      - rebuttal
    file_patterns:
      - "**/reviews/**"
      - "**/rebuttal/**"

  rules:
    - id: PRV-001
      description: "리뷰는 구조화된 형식: Summary, Strengths, Weaknesses, Questions, Suggestions"
      impact: critical

    - id: PRV-002
      description: "비판은 항상 구체적 근거와 개선 방향을 포함"
      impact: high

    - id: PRV-003
      description: "재현성 관련 이슈는 반드시 명시 (코드 공개, 하이퍼파라미터, 데이터셋)"
      impact: high

    - id: PRV-004
      description: "통계적 유의성 검증 여부 확인 (p-value, confidence interval, multiple runs)"
      impact: high

  tools:
    - pdf-reader
    - experiment-tracker

  complementary_skills:
    - paper-reading
    - knowledge-extraction

  prerequisites:
    - paper-reading

  leads_to:
    - paper-writing
