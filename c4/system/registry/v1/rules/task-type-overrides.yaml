rules:
  # ==========================================================================
  # Task Type Overrides
  # ==========================================================================
  # These overrides take precedence over domain defaults.
  # When a task matches these conditions, the specified agent is used
  # regardless of the domain's primary agent.

  overrides:
    # --------------------------------------------------------------------------
    # Debugging Tasks → debugger
    # --------------------------------------------------------------------------
    - name: debug-tasks
      priority: 100
      condition:
        task_type:
          - debug
          - debugging
          - fix-bug
      action:
        set_primary: debugger
      reason: "Debugging tasks require specialized debugging expertise"

    # --------------------------------------------------------------------------
    # Performance Tasks → performance-engineer
    # --------------------------------------------------------------------------
    - name: performance-tasks
      priority: 95
      condition:
        task_type:
          - performance
          - optimization
          - profiling
      action:
        set_primary: performance-engineer
      reason: "Performance work requires profiling and optimization skills"

    # --------------------------------------------------------------------------
    # Security Tasks → security-auditor
    # --------------------------------------------------------------------------
    - name: security-tasks
      priority: 95
      condition:
        task_type:
          - security
          - vulnerability
          - audit
      action:
        set_primary: security-auditor
      reason: "Security-sensitive tasks need security expertise"

    # --------------------------------------------------------------------------
    # Database Tasks → database-optimizer
    # --------------------------------------------------------------------------
    - name: database-tasks
      priority: 90
      condition:
        task_type:
          - database
          - query
          - migration
      action:
        set_primary: database-optimizer
      reason: "Database work requires schema and query optimization skills"

    # --------------------------------------------------------------------------
    # Documentation Tasks → api-documenter
    # --------------------------------------------------------------------------
    - name: documentation-tasks
      priority: 85
      condition:
        task_type:
          - docs
          - documentation
          - readme
      action:
        set_primary: api-documenter
      reason: "Documentation requires clear technical writing skills"

    # --------------------------------------------------------------------------
    # Refactoring Tasks → code-refactorer
    # --------------------------------------------------------------------------
    - name: refactoring-tasks
      priority: 85
      condition:
        task_type:
          - refactor
          - cleanup
          - restructure
      action:
        set_primary: code-refactorer
      reason: "Refactoring requires pattern knowledge and behavior preservation"

    # --------------------------------------------------------------------------
    # Testing Tasks → test-automator
    # --------------------------------------------------------------------------
    - name: testing-tasks
      priority: 85
      condition:
        task_type:
          - test
          - testing
          - coverage
      action:
        set_primary: test-automator
      reason: "Testing requires comprehensive test design skills"

    # --------------------------------------------------------------------------
    # DevOps/Deployment Tasks → deployment-engineer
    # --------------------------------------------------------------------------
    - name: deployment-tasks
      priority: 85
      condition:
        task_type:
          - deploy
          - ci-cd
          - pipeline
      action:
        set_primary: deployment-engineer
      reason: "CI/CD and deployment automation expertise"

    # --------------------------------------------------------------------------
    # GraphQL Tasks → graphql-architect
    # --------------------------------------------------------------------------
    - name: graphql-tasks
      priority: 85
      condition:
        task_type:
          - graphql
          - schema
      action:
        set_primary: graphql-architect
      reason: "GraphQL requires schema design and resolver optimization"

    # --------------------------------------------------------------------------
    # Payment Tasks → payment-integration
    # --------------------------------------------------------------------------
    - name: payment-tasks
      priority: 90
      condition:
        task_type:
          - payment
          - stripe
          - billing
      action:
        set_primary: payment-integration
      reason: "Payment integration requires PCI compliance knowledge"

    # --------------------------------------------------------------------------
    # Data Pipeline Tasks → data-engineer
    # --------------------------------------------------------------------------
    - name: data-pipeline-tasks
      priority: 85
      condition:
        task_type:
          - data-pipeline
          - etl
      action:
        set_primary: data-engineer
      reason: "ETL and data pipeline design expertise"

    # --------------------------------------------------------------------------
    # Data Science Tasks → data-scientist
    # --------------------------------------------------------------------------
    - name: data-science-tasks
      priority: 85
      condition:
        task_type:
          - analytics
          - data-analysis
          - notebook
      action:
        set_primary: data-scientist
      reason: "Data analysis and visualization expertise"

    # --------------------------------------------------------------------------
    # API Design Tasks → backend-architect
    # --------------------------------------------------------------------------
    - name: api-design-tasks
      priority: 80
      condition:
        task_type:
          - api-design
      action:
        set_primary: backend-architect
      reason: "API design requires architectural thinking"

    # --------------------------------------------------------------------------
    # Monitoring Tasks → devops-troubleshooter
    # --------------------------------------------------------------------------
    - name: monitoring-tasks
      priority: 80
      condition:
        task_type:
          - monitoring
      action:
        set_primary: devops-troubleshooter
      reason: "Monitoring requires log analysis and metrics expertise"

    # --------------------------------------------------------------------------
    # Incident Tasks → incident-responder
    # --------------------------------------------------------------------------
    - name: incident-tasks
      priority: 100
      condition:
        task_type:
          - incident
      action:
        set_primary: incident-responder
      reason: "Incidents require rapid response coordination"

    # --------------------------------------------------------------------------
    # Infrastructure Tasks → cloud-architect
    # --------------------------------------------------------------------------
    - name: infra-setup-tasks
      priority: 85
      condition:
        task_type:
          - infra-setup
      action:
        set_primary: cloud-architect
      reason: "Infrastructure setup requires cloud architecture expertise"

    # --------------------------------------------------------------------------
    # Paper Review Tasks → paper-reviewer
    # --------------------------------------------------------------------------
    - name: paper-review-tasks
      priority: 90
      condition:
        task_type:
          - paper-review
          - peer-review
          - rebuttal
      action:
        set_primary: paper-reviewer
      reason: "Paper reviews require academic peer review expertise"

    # --------------------------------------------------------------------------
    # Literature Review Tasks → paper-reader
    # --------------------------------------------------------------------------
    - name: literature-review-tasks
      priority: 85
      condition:
        task_type:
          - literature-review
          - paper-reading
          - survey
      action:
        set_primary: paper-reader
      reason: "Literature reviews require systematic paper analysis"

    # --------------------------------------------------------------------------
    # Paper Writing Tasks → paper-writer
    # --------------------------------------------------------------------------
    - name: paper-writing-tasks
      priority: 85
      condition:
        task_type:
          - paper-writing
          - drafting
          - manuscript
      action:
        set_primary: paper-writer
      reason: "Paper writing requires academic writing expertise"

    # --------------------------------------------------------------------------
    # Knowledge Extraction Tasks → knowledge-engineer
    # --------------------------------------------------------------------------
    - name: knowledge-extraction-tasks
      priority: 85
      condition:
        task_type:
          - knowledge-extraction
          - meta-analysis
          - synthesis
      action:
        set_primary: knowledge-engineer
      reason: "Knowledge extraction requires systematic synthesis skills"

  # ==========================================================================
  # Chain Extension Rules
  # ==========================================================================
  chain_extensions:
    - name: api-needs-docs
      condition:
        all:
          - domain: api
          - task_type: [implement, create]
      action:
        add_to_chain: api-documenter
        position: after_primary

    - name: ml-needs-engineer
      condition:
        all:
          - domain: [ml-dl, data-science]
          - has_keyword: [deploy, serving, production]
      action:
        ensure_in_chain:
          - ml-engineer
          - test-automator

    - name: production-needs-security
      condition:
        has_keyword: [production, prod, deploy]
      action:
        add_to_chain: security-auditor
        position: before_last

    - name: auth-needs-security
      condition:
        has_keyword: [auth, login, password, token, secret, credential, api-key]
      action:
        add_to_chain: security-auditor
        position: before_last

    - name: db-changes-need-optimizer
      condition:
        any:
          - has_keyword: [sql, query, index, schema]
          - file_pattern: ["**/migrations/**", "**/*.sql"]
      action:
        add_to_chain: database-optimizer
        position: after_primary

    - name: research-needs-knowledge
      condition:
        all:
          - domain: research
          - has_keyword: [survey, literature, related work, meta-analysis]
      action:
        ensure_in_chain:
          - knowledge-engineer
          - paper-reader

  # ==========================================================================
  # Agent Selection Heuristics
  # ==========================================================================
  selection:
    - name: prefer-specialist
      description: "Prefer agents with higher skill match"
      when: multiple_agents_match
      strategy: |
        1. skill_match_count (higher is better)
        2. primary_skill_match (+2 weight for primary match)
        3. domain_preference (+1 weight for domain preference)

    - name: fallback-to-general
      description: "Use general-purpose when no match"
      when: no_exact_match
      strategy: |
        return general-purpose with code-reviewer in chain
