domain:
  id: data-science
  name: "Data Science & ML"
  description: "데이터 분석, 머신러닝 모델 개발, 실험, 시각화"

  required_skills:
    core:
      - data-analysis
      - ml-training
      - statistical-modeling
    optional:
      - deep-learning
      - visualization
      - experiment-design

  workflow:
    - step: 1
      role: primary
      select:
        by: skill
        skills: [data-analysis, ml-training]
        prefer_agent: data-scientist
      purpose: "데이터 분석 및 모델 개발"

    - step: 2
      role: support
      select:
        by: skill
        skills: [python-coding]
        prefer_agent: python-pro
      purpose: "코드 품질 및 최적화"
      condition: "when code_complexity > medium"

    - step: 3
      role: quality
      select:
        by: skill
        skills: [testing]
        prefer_agent: test-automator
      purpose: "모델 테스트 및 검증"

  rules:
    - if: "task_has_keyword(['notebook', 'jupyter', 'eda'])"
      then: "ensure_agent(data-scientist)"
    - if: "task_has_keyword(['deploy', 'serving', 'production'])"
      then: "add_to_chain(ml-engineer, after=primary)"
    - if: "task_has_keyword(['deep-learning', 'neural', 'pytorch', 'tensorflow'])"
      then: "add_to_chain(ml-engineer, after=primary)"
