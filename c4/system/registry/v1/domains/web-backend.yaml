domain:
  id: web-backend
  name: "Web Backend Development"
  description: "웹 백엔드 서비스 개발, API 설계, 데이터베이스, 서버 로직 구현"

  required_skills:
    core:
      - api-design
      - backend-architecture
      - database-design
    optional:
      - security
      - performance-optimization
      - caching

  workflow:
    - step: 1
      role: primary
      select:
        by: skill
        skills: [api-design, backend-architecture]
        prefer_agent: backend-architect
      purpose: "아키텍처 설계 및 API 정의"

    - step: 2
      role: support
      select:
        by: skill
        skills: [python-coding, backend-development]
        prefer_agent: python-pro
      purpose: "구현 및 코드 작성"

    - step: 3
      role: quality
      select:
        by: skill
        skills: [testing]
        prefer_agent: test-automator
      purpose: "테스트 작성 및 검증"

    - step: 4
      role: quality
      select:
        by: skill
        skills: [code-review]
        prefer_agent: code-reviewer
      purpose: "코드 리뷰"
      condition: "when changes > 100 lines"

  rules:
    - if: "task_has_keyword(['auth', 'login', 'password'])"
      then: "add_to_chain(security-auditor, before=code-reviewer)"
    - if: "task_has_keyword(['performance', 'slow', 'optimize'])"
      then: "add_to_chain(performance-engineer, after=primary)"
