skill:
  id: statistical-testing
  name: "Statistical Testing & Hypothesis Validation"
  description: "A/B 테스트, 가설 검정, 통계적 유의성 분석을 통한 데이터 기반 의사결정"

  impact: high
  category: data-processing
  domains:
    - data-science

  domain_specific:
    data-science:
      priority_boost: 0.5

  metadata:
    version: "1.0.0"
    author: "c4-team"
    license: MIT
    tags: [statistics, hypothesis-testing, ab-testing, significance]

  capabilities:
    - hypothesis-testing
    - ab-testing
    - significance-analysis
    - confidence-intervals
    - effect-size-calculation
    - sample-size-estimation

  triggers:
    keywords:
      - statistical
      - hypothesis
      - p-value
      - significance
      - A/B test
      - t-test
      - chi-square
      - confidence interval
      - effect size
    task_types:
      - statistics
      - ab-test
      - hypothesis-test
      - analysis
    file_patterns:
      - "**/statistics/**"
      - "**/tests/**"
      - "ab_*.py"

  rules:
    - id: STAT-001
      description: "다중 비교 시 보정 적용 (Bonferroni, FDR 등)"
      impact: critical
      example_bad: |
        for feature in features:
            p_value = ttest(group_a[feature], group_b[feature]).pvalue
            if p_value < 0.05:
                print(f"{feature} is significant")
      example_good: |
        from statsmodels.stats.multitest import multipletests
        p_values = [ttest(group_a[f], group_b[f]).pvalue for f in features]
        reject, p_corrected, _, _ = multipletests(p_values, method='fdr_bh')

    - id: STAT-002
      description: "효과 크기(effect size)를 p-value와 함께 보고"
      impact: high
      example_bad: |
        result = {"p_value": 0.03}  # p-value만 보고
      example_good: |
        result = {
            "p_value": 0.03,
            "effect_size": cohens_d(group_a, group_b),
            "confidence_interval": (ci_lower, ci_upper)
        }

    - id: STAT-003
      description: "실험 전 검정력 분석으로 필요 샘플 크기 결정"
      impact: high
      example_bad: |
        # 샘플 크기 계산 없이 실험 시작
        run_ab_test(users[:1000])
      example_good: |
        from statsmodels.stats.power import TTestIndPower
        power = TTestIndPower()
        sample_size = power.solve_power(
            effect_size=0.2, power=0.8, alpha=0.05
        )
        assert len(users) >= sample_size * 2

  tools:
    - scipy
    - statsmodels
    - pingouin
    - numpy

  complementary_skills:
    - data-analysis
    - feature-engineering
    - experiment-tracking

  leads_to:
    - experiment-tracking
    - data-analysis
