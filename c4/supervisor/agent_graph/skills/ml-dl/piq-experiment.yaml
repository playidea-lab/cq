# PiQ Experiment Skill
#
# This skill ensures C4 generates code that works correctly with PiQ's
# @piqr decorator and automatic metric capture system.

skill:
  id: piq-experiment
  name: "PiQ Experiment Development"
  description: |
    PiQ 실험 자동화 시스템을 위한 코드 생성 규칙.
    @piqr 데코레이터 사용, key: value 메트릭 출력, 재현성 보장.

  impact: critical
  category: ml-experiment
  domains:
    - ml-dl
    - data-science

  domain_specific:
    ml-dl:
      priority_boost: 0.8  # High priority when piq is detected
    data-science:
      priority_boost: 0.5

  metadata:
    version: "1.0.0"
    author: "piq-team"
    license: MIT
    tags: [piq, piqr, experiment, ml, reproducibility, metric-capture]

  capabilities:
    - piqr-decorator-usage
    - metric-capture
    - seed-fixing
    - data-versioning
    - config-management
    - distributed-training

  triggers:
    keywords:
      - piq
      - piqr
      - "@piqr"
      - experiment
      - 실험
      - training
      - 학습
      - metric
      - 메트릭
    task_types:
      - train
      - experiment
      - ml-training
      - model-training
      - hyperparameter-tuning
    file_patterns:
      - "**/piqr.py"
      - "**/piq/**"
      - "packages/piq/**"
      - "**/experiments/**"

  # =====================================================
  # Core Rules - MUST follow for PiQ compatibility
  # =====================================================
  rules:
    - id: PIQ-001
      description: "모든 실험 함수는 @piqr 데코레이터 필수"
      impact: critical
      example_bad: |
        def train_model(config):
            # No decorator - piqr cannot capture metrics
            for epoch in range(100):
                loss = train_step()
            return loss
      example_good: |
        from piq.piqr import piqr

        @piqr
        def train_model(config: TrainConfig):
            # piqr automatically captures metrics
            for epoch in range(config.epochs):
                loss = train_step()
                print(f"epoch: {epoch}, loss: {loss:.4f}")
            return {"final_loss": loss}

    - id: PIQ-002
      description: "메트릭 출력은 반드시 'key: value' 형식"
      impact: critical
      example_bad: |
        print(f"The loss is {loss}")
        print(f"Accuracy = {acc}%")
        print(f"Training completed with loss of {loss}")
      example_good: |
        print(f"loss: {loss:.4f}")
        print(f"accuracy: {acc:.4f}")
        print(f"epoch: {epoch}, train_loss: {train_loss:.4f}, val_accuracy: {val_acc:.4f}")

    - id: PIQ-003
      description: "실험 시작 시 seed 고정 필수"
      impact: critical
      example_bad: |
        @piqr
        def train(config):
            model = RandomForestClassifier()  # No seed
            model.fit(X, y)
      example_good: |
        import random
        import numpy as np
        import torch

        def set_seed(seed: int = 42):
            random.seed(seed)
            np.random.seed(seed)
            torch.manual_seed(seed)
            if torch.cuda.is_available():
                torch.cuda.manual_seed_all(seed)

        @piqr
        def train(config: TrainConfig):
            set_seed(config.seed)
            print(f"seed: {config.seed}")
            model = RandomForestClassifier(random_state=config.seed)

    - id: PIQ-004
      description: "데이터 버전 명시 필수"
      impact: high
      example_bad: |
        data = pd.read_csv("data.csv")
      example_good: |
        data = load_data(version="sha256:abc123")
        print(f"data_version: {config.data_version}")

    - id: PIQ-005
      description: "Config는 전역 변수가 아닌 함수 인자로 전달"
      impact: high
      example_bad: |
        CONFIG = load_config()  # Global variable

        @piqr
        def train():
            lr = CONFIG["lr"]
      example_good: |
        class TrainConfig(BaseModel):
            lr: float = 0.001
            epochs: int = 100

        @piqr
        def train(config: TrainConfig):
            lr = config.lr
            print(f"lr: {config.lr}")

    - id: PIQ-006
      description: "실험 결과는 dict로 반환"
      impact: high
      example_bad: |
        @piqr
        def train(config):
            ...
            return accuracy  # Just a float
      example_good: |
        @piqr
        def train(config: TrainConfig):
            ...
            return {
                "final_loss": best_loss,
                "final_accuracy": best_acc,
                "epochs_trained": config.epochs,
            }

    - id: PIQ-007
      description: "하드코딩된 경로 금지"
      impact: medium
      example_bad: |
        model.save("/home/user/models/model.pt")
      example_good: |
        from pathlib import Path
        output_dir = Path(config.output_dir)
        model.save(output_dir / "model.pt")

    - id: PIQ-008
      description: "메트릭 키는 snake_case 사용"
      impact: medium
      example_bad: |
        print(f"TrainLoss: {loss}")
        print(f"train-loss: {loss}")
      example_good: |
        print(f"train_loss: {loss:.4f}")
        print(f"val_accuracy: {acc:.4f}")

  # =====================================================
  # Templates
  # =====================================================
  templates:
    basic_experiment: |
      """Basic PiQ experiment template."""
      import random
      from pathlib import Path

      import numpy as np
      import torch
      from pydantic import BaseModel

      from piq.piqr import piqr


      class TrainConfig(BaseModel):
          """Experiment configuration."""
          seed: int = 42
          epochs: int = 100
          lr: float = 0.001
          batch_size: int = 32
          data_version: str = "v1"
          output_dir: str = "outputs"


      def set_seed(seed: int = 42):
          """Fix all random seeds for reproducibility."""
          random.seed(seed)
          np.random.seed(seed)
          torch.manual_seed(seed)
          if torch.cuda.is_available():
              torch.cuda.manual_seed_all(seed)


      @piqr
      def train(config: TrainConfig):
          """Main training function."""
          # 1. Set seed
          set_seed(config.seed)

          # 2. Log config (auto-captured by piqr)
          print(f"seed: {config.seed}")
          print(f"data_version: {config.data_version}")
          print(f"epochs: {config.epochs}")
          print(f"lr: {config.lr}")

          # 3. Load data
          train_loader, val_loader = load_data(
              version=config.data_version,
              batch_size=config.batch_size,
          )

          # 4. Model & Optimizer
          model = build_model()
          optimizer = torch.optim.Adam(model.parameters(), lr=config.lr)

          # 5. Training loop
          best_loss = float("inf")
          best_acc = 0.0

          for epoch in range(config.epochs):
              train_loss = train_epoch(model, train_loader, optimizer)
              val_loss, val_acc = validate(model, val_loader)

              # Key: value format for piqr parsing
              print(f"epoch: {epoch}, train_loss: {train_loss:.4f}, "
                    f"val_loss: {val_loss:.4f}, val_accuracy: {val_acc:.4f}")

              if val_loss < best_loss:
                  best_loss = val_loss
                  best_acc = val_acc
                  torch.save(model.state_dict(),
                            Path(config.output_dir) / "best.pt")

          # 6. Return results as dict
          return {
              "final_loss": best_loss,
              "final_accuracy": best_acc,
              "epochs_trained": config.epochs,
          }


      if __name__ == "__main__":
          config = TrainConfig()
          result = train(config)
          print(f"Training complete: {result}")

    hydra_experiment: |
      """PiQ + Hydra integration template."""
      import hydra
      from omegaconf import DictConfig, OmegaConf

      from piq.piqr import piqr


      @hydra.main(version_base=None, config_path="config", config_name="train")
      @piqr
      def train(cfg: DictConfig):
          """Hydra config-based training."""
          # Config output (for debugging)
          print(OmegaConf.to_yaml(cfg))

          # Set seed
          set_seed(cfg.seed)
          print(f"seed: {cfg.seed}")
          print(f"data_version: {cfg.data.version}")

          # Training loop
          for epoch in range(cfg.epochs):
              loss, acc = train_epoch(...)
              print(f"epoch: {epoch}, loss: {loss:.4f}, accuracy: {acc:.4f}")

          return {"final_loss": loss, "final_accuracy": acc}


      if __name__ == "__main__":
          train()

  # =====================================================
  # Integration
  # =====================================================
  dependencies:
    required:
      - machine-learning
    optional:
      - deep-learning
      - hydra-config

  tools:
    - piq.piqr
    - pydantic
    - torch
    - hydra-core

  complementary_skills:
    - experiment-tracking
    - model-optimization
    - statistical-testing
    - data-validation

  leads_to:
    - model-optimization
    - distributed-training
    - deployment
