skill:
  id: react-optimization
  name: "React Performance Optimization"
  description: "React 애플리케이션의 렌더링 최적화, 메모이제이션, 코드 스플리팅, 번들 사이즈 최적화"

  impact: critical
  category: performance
  domains:
    - web-frontend

  domain_specific:
    web-frontend:
      priority_boost: 0.5

  metadata:
    version: "1.0.0"
    author: "c4-team"
    license: MIT
    tags: [react, performance, optimization, memoization, code-splitting]

  capabilities:
    - render-optimization
    - memoization
    - code-splitting
    - bundle-optimization
    - virtualization
    - lazy-loading

  triggers:
    keywords:
      - React
      - optimization
      - performance
      - render
      - memo
      - useMemo
      - useCallback
      - bundle size
      - lazy load
      - code split
    task_types:
      - optimization
      - performance
      - frontend
    file_patterns:
      - "*.tsx"
      - "*.jsx"
      - "**/components/**"

  rules:
    - id: REACT-001
      description: "불필요한 리렌더링 방지: memo, useMemo, useCallback 적절히 사용"
      impact: critical
      example_bad: |
        function List({ items, onSelect }) {
          return items.map(item => (
            <Item key={item.id} onClick={() => onSelect(item)} />
          ));
        }
      example_good: |
        const List = memo(function List({ items, onSelect }) {
          const handleSelect = useCallback((item) => onSelect(item), [onSelect]);
          return items.map(item => (
            <Item key={item.id} onClick={handleSelect} item={item} />
          ));
        });

    - id: REACT-002
      description: "큰 리스트는 가상화(virtualization) 적용"
      impact: critical
      example_bad: |
        {items.map(item => <ListItem key={item.id} {...item} />)}
      example_good: |
        import { FixedSizeList } from 'react-window';
        <FixedSizeList height={400} itemCount={items.length} itemSize={50}>
          {({ index, style }) => <ListItem style={style} {...items[index]} />}
        </FixedSizeList>

    - id: REACT-003
      description: "동적 import로 코드 스플리팅 적용"
      impact: high
      example_bad: |
        import HeavyComponent from './HeavyComponent';
      example_good: |
        const HeavyComponent = lazy(() => import('./HeavyComponent'));
        <Suspense fallback={<Loading />}>
          <HeavyComponent />
        </Suspense>

    - id: REACT-004
      description: "이미지 최적화: next/image 또는 lazy loading 적용"
      impact: high
      example_bad: |
        <img src={largePng} alt="hero" />
      example_good: |
        import Image from 'next/image';
        <Image src={largePng} alt="hero" width={800} height={400} priority />

  tools:
    - react-devtools
    - webpack-bundle-analyzer
    - lighthouse
    - react-window

  complementary_skills:
    - accessibility
    - testing
    - code-review

  leads_to:
    - testing
    - deployment
