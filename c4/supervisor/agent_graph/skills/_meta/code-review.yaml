skill:
  id: code-review
  name: "Code Review & Quality Assurance"
  description: "코드 리뷰, 품질 분석, 베스트 프랙티스 검증, 리팩토링 제안을 통한 코드 품질 향상"

  impact: high
  category: quality
  domains:
    - universal

  metadata:
    version: "1.0.0"
    author: "c4-team"
    license: MIT
    tags: [code-quality, review, best-practices]

  capabilities:
    - code-analysis
    - pattern-detection
    - refactoring-suggestion
    - style-checking
    - complexity-analysis

  triggers:
    keywords:
      - review
      - code review
      - PR
      - pull request
      - refactor
      - improve
      - quality
      - clean code
    task_types:
      - review
      - code-review
      - refactor
      - improve
    file_patterns:
      - "*.py"
      - "*.ts"
      - "*.js"
      - "*.go"

  rules:
    - id: REV-001
      description: "함수는 단일 책임을 가져야 함 (Single Responsibility Principle)"
      impact: high
      example_bad: |
        def process_user(data):
            validate(data)
            save_to_db(data)
            send_email(data)
            log_activity(data)
      example_good: |
        def validate_user(data): ...
        def save_user(data): ...
        def notify_user(data): ...

    - id: REV-002
      description: "복잡한 조건문은 설명 변수나 함수로 추출"
      impact: medium
      example_bad: |
        if user.age >= 18 and user.verified and not user.banned:
            allow_access()
      example_good: |
        is_eligible = user.age >= 18 and user.verified and not user.banned
        if is_eligible:
            allow_access()

    - id: REV-003
      description: "매직 넘버 대신 명명된 상수 사용"
      impact: medium
      example_bad: |
        if status == 200:
            return True
      example_good: |
        HTTP_OK = 200
        if status == HTTP_OK:
            return True

  tools:
    - linter
    - static-analyzer
    - code-formatter

  complementary_skills:
    - testing
    - debugging
    - security-scanning

  leads_to:
    - testing
    - deployment
