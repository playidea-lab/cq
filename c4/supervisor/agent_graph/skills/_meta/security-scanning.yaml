skill:
  id: security-scanning
  name: "Security Scanning & Vulnerability Detection"
  description: "보안 취약점 탐지, OWASP Top 10 검사, 의존성 감사, 시크릿 노출 방지"

  impact: critical
  category: security
  domains:
    - universal

  metadata:
    version: "1.0.0"
    author: "c4-team"
    license: MIT
    tags: [security, vulnerability, owasp, audit]

  capabilities:
    - vulnerability-scanning
    - dependency-audit
    - secret-detection
    - injection-prevention
    - authentication-review

  triggers:
    keywords:
      - security
      - vulnerability
      - CVE
      - OWASP
      - injection
      - XSS
      - SQL injection
      - secret
      - credential
      - audit
    task_types:
      - security
      - audit
      - vulnerability
    file_patterns:
      - "**/.env*"
      - "**/secrets/**"
      - "**/credentials/**"

  rules:
    - id: SEC-001
      description: "SQL 쿼리에 사용자 입력을 직접 포함하지 않음 (SQL Injection 방지)"
      impact: critical
      example_bad: |
        query = f"SELECT * FROM users WHERE id = {user_id}"
        cursor.execute(query)
      example_good: |
        query = "SELECT * FROM users WHERE id = %s"
        cursor.execute(query, (user_id,))

    - id: SEC-002
      description: "시크릿 키나 자격 증명을 코드에 하드코딩하지 않음"
      impact: critical
      example_bad: |
        API_KEY = "sk-abc123xyz"
        db_password = "admin123"
      example_good: |
        API_KEY = os.environ["API_KEY"]
        db_password = get_secret("db_password")

    - id: SEC-003
      description: "사용자 입력을 HTML에 출력할 때 이스케이프 처리 (XSS 방지)"
      impact: critical
      example_bad: |
        return f"<div>{user_input}</div>"
      example_good: |
        return f"<div>{html.escape(user_input)}</div>"

    - id: SEC-004
      description: "인증 토큰은 안전한 저장소에 보관하고 로그에 노출하지 않음"
      impact: high
      example_bad: |
        logger.info(f"Token: {access_token}")
      example_good: |
        logger.info("Token refreshed successfully")

  tools:
    - snyk
    - trivy
    - bandit
    - gitleaks
    - dependabot

  complementary_skills:
    - code-review
    - authentication
    - error-handling

  leads_to:
    - deployment
    - monitoring
