skill:
  id: container-orchestration
  name: "Container Orchestration (Kubernetes/Docker)"
  description: "Docker 컨테이너화, Kubernetes 배포, 서비스 메시, 자동 스케일링 구현"

  impact: high
  category: operations
  domains:
    - infra
    - devops

  domain_specific:
    infra:
      priority_boost: 0.5
    devops:
      priority_boost: 0.5

  metadata:
    version: "1.0.0"
    author: "c4-team"
    license: MIT
    tags: [kubernetes, docker, k8s, container, orchestration, deployment]

  capabilities:
    - container-building
    - kubernetes-deployment
    - service-mesh
    - auto-scaling
    - resource-management
    - health-checks

  triggers:
    keywords:
      - Kubernetes
      - K8s
      - Docker
      - container
      - pod
      - deployment
      - service
      - ingress
      - helm
      - kubectl
    task_types:
      - kubernetes
      - container
      - deployment
      - orchestration
    file_patterns:
      - "Dockerfile*"
      - "*.yaml"
      - "**/k8s/**"
      - "**/kubernetes/**"
      - "docker-compose*.yml"

  rules:
    - id: K8S-001
      description: "리소스 요청(request)과 제한(limit) 반드시 설정"
      impact: critical
      example_bad: |
        containers:
          - name: app
            image: myapp:latest
      example_good: |
        containers:
          - name: app
            image: myapp:v1.2.3
            resources:
              requests:
                memory: "256Mi"
                cpu: "250m"
              limits:
                memory: "512Mi"
                cpu: "500m"

    - id: K8S-002
      description: "latest 태그 사용 금지, 명시적 버전 태그 사용"
      impact: critical
      example_bad: |
        image: myapp:latest
      example_good: |
        image: myapp:v1.2.3
        # 또는 SHA 사용
        image: myapp@sha256:abc123...

    - id: K8S-003
      description: "활성 프로브(liveness)와 준비 프로브(readiness) 설정"
      impact: high
      example_bad: |
        containers:
          - name: app
            image: myapp:v1.2.3
      example_good: |
        containers:
          - name: app
            image: myapp:v1.2.3
            livenessProbe:
              httpGet:
                path: /health
                port: 8080
              initialDelaySeconds: 10
              periodSeconds: 15
            readinessProbe:
              httpGet:
                path: /ready
                port: 8080
              initialDelaySeconds: 5
              periodSeconds: 5

    - id: K8S-004
      description: "민감한 정보는 Secret으로 관리, ConfigMap과 분리"
      impact: critical
      example_bad: |
        env:
          - name: DATABASE_PASSWORD
            value: "secret123"
      example_good: |
        env:
          - name: DATABASE_PASSWORD
            valueFrom:
              secretKeyRef:
                name: db-credentials
                key: password

  tools:
    - kubectl
    - helm
    - kustomize
    - docker
    - buildah

  complementary_skills:
    - monitoring
    - deployment
    - security-scanning

  leads_to:
    - monitoring
    - deployment
