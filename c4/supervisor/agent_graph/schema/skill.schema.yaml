$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://c4.dev/schema/skill.schema.yaml"
title: "Skill Definition V2"
description: "Defines an atomic capability that agents can possess (extended with impact, domains, metadata, rules)"
type: object

required:
  - skill

properties:
  skill:
    type: object
    required:
      - id
      - name
      - description
      - capabilities
      - triggers

    properties:
      # === Core Required Fields ===
      id:
        type: string
        pattern: "^[a-z][a-z0-9-]*$"
        description: "Unique identifier for the skill (kebab-case)"
        examples:
          - "debugging"
          - "api-design"
          - "experiment-tracking"

      name:
        type: string
        minLength: 1
        maxLength: 100
        description: "Human-readable name of the skill"
        examples:
          - "Debugging & Error Analysis"
          - "API Design & Architecture"
          - "ML Experiment Tracking"

      description:
        type: string
        minLength: 10
        maxLength: 500
        description: "Detailed description of what this skill enables"

      capabilities:
        type: array
        minItems: 1
        items:
          type: string
          pattern: "^[a-z][a-z0-9-]*$"
        description: "List of specific capabilities this skill provides"
        examples:
          - ["error-tracing", "stack-analysis", "breakpoint-debugging"]

      triggers:
        type: object
        description: "Conditions that trigger this skill"
        properties:
          keywords:
            type: array
            items:
              type: string
            description: "Keywords in task that trigger this skill"
            examples:
              - ["bug", "error", "crash", "exception"]

          task_types:
            type: array
            items:
              type: string
              pattern: "^[a-z][a-z0-9-]*$"
            description: "Task types that require this skill"
            examples:
              - ["debug", "fix-bug", "hotfix"]

          file_patterns:
            type: array
            items:
              type: string
            description: "File patterns that indicate need for this skill"
            examples:
              - ["*.log", "*.trace", "**/errors/**"]

        anyOf:
          - required: ["keywords"]
          - required: ["task_types"]
          - required: ["file_patterns"]

      # === V2 New Fields: Impact & Category ===
      impact:
        type: string
        enum: ["critical", "high", "medium", "low"]
        default: "medium"
        description: "Priority level for this skill (affects scoring)"

      category:
        type: string
        enum: ["performance", "security", "quality", "architecture", "data-processing", "operations"]
        description: "Category of this skill for grouping"

      # === V2 New Fields: Multi-domain Support ===
      domains:
        type: array
        items:
          type: string
          pattern: "^[a-z][a-z0-9-]*$"
        default: ["universal"]
        description: "Domains where this skill is applicable"
        examples:
          - ["web-frontend", "web-backend"]
          - ["ml-dl", "data-science"]

      domain_specific:
        type: object
        additionalProperties:
          type: object
          properties:
            triggers:
              $ref: "#/properties/skill/properties/triggers"
            priority_boost:
              type: number
              minimum: 0
              maximum: 2
              default: 0
              description: "Score boost when skill is used in this domain"
        description: "Domain-specific trigger overrides and priority boosts"

      # === V2 New Fields: Metadata ===
      metadata:
        type: object
        properties:
          version:
            type: string
            pattern: "^\\d+\\.\\d+\\.\\d+$"
            default: "1.0.0"
            description: "Semantic version of this skill definition"
          author:
            type: string
            description: "Author or team that created this skill"
          license:
            type: string
            enum: ["MIT", "Apache-2.0", "proprietary", "unlicensed"]
            default: "unlicensed"
          tags:
            type: array
            items:
              type: string
            description: "Tags for discovery and filtering"
          deprecated:
            type: boolean
            default: false
            description: "Whether this skill is deprecated"
          deprecated_by:
            type: string
            pattern: "^[a-z][a-z0-9-]*$"
            description: "ID of skill that replaces this one (if deprecated)"
        description: "Metadata for versioning and discovery"

      # === V2 New Fields: Embedded Rules (Vercel SKILL.md style) ===
      rules:
        type: array
        items:
          type: object
          required:
            - id
            - description
          properties:
            id:
              type: string
              pattern: "^[A-Z0-9]+-\\d{3}$"
              description: "Rule ID (e.g., PERF-001, SEC-002, A11Y-001)"
            description:
              type: string
              minLength: 10
              maxLength: 500
            impact:
              type: string
              enum: ["critical", "high", "medium", "low"]
              default: "medium"
            example_bad:
              type: string
              description: "Example of code that violates this rule"
            example_good:
              type: string
              description: "Example of code that follows this rule"
        description: "Embedded rules for this skill (impact guidelines)"

      # === V2 New Fields: Dependencies ===
      dependencies:
        type: object
        properties:
          required:
            type: array
            items:
              type: string
              pattern: "^[a-z][a-z0-9-]*$"
            description: "Skills that must be present for this skill to work"
          optional:
            type: array
            items:
              type: string
              pattern: "^[a-z][a-z0-9-]*$"
            description: "Skills that enhance this skill if present"
        description: "Skill dependencies"

      # === Original Optional Fields ===
      tools:
        type: array
        items:
          type: string
        description: "Tools or libraries commonly used with this skill"
        examples:
          - ["debugger", "profiler", "logger"]

      complementary_skills:
        type: array
        items:
          type: string
          pattern: "^[a-z][a-z0-9-]*$"
        description: "Skills that work well together with this one"
        examples:
          - ["profiling", "logging", "testing"]

      prerequisites:
        type: array
        items:
          type: string
          pattern: "^[a-z][a-z0-9-]*$"
        description: "Skills that should be applied before this one"

      leads_to:
        type: array
        items:
          type: string
          pattern: "^[a-z][a-z0-9-]*$"
        description: "Skills that typically follow this one"

additionalProperties: false
