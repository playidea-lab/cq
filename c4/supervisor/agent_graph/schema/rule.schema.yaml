$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://c4.dev/schema/rule.schema.yaml"
title: "Rule Definition"
description: "Defines routing rules for agent selection and chain building"
type: object

required:
  - rules

properties:
  rules:
    type: object
    properties:
      # Override rules - highest priority, always checked first
      overrides:
        type: array
        items:
          type: object
          required:
            - name
            - priority
            - condition
            - action
            - reason
          properties:
            name:
              type: string
              pattern: "^[a-z][a-z0-9-]*$"
              description: "Unique rule name"
              examples:
                - "debug-always-debugger"
                - "security-critical"

            priority:
              type: integer
              minimum: 1
              maximum: 100
              description: "Priority (higher = evaluated first)"
              examples:
                - 100
                - 95

            condition:
              $ref: "#/$defs/condition"

            action:
              type: object
              description: "Action to take when condition matches"
              properties:
                set_primary:
                  type: string
                  pattern: "^[a-z][a-z0-9-]*$"
                  description: "Override primary agent"

                add_to_chain:
                  type: string
                  pattern: "^[a-z][a-z0-9-]*$"
                  description: "Add agent to chain"

                position:
                  type: string
                  enum:
                    - first
                    - after_primary
                    - before_last
                    - last
                  description: "Position in chain for add_to_chain"

                require_agent:
                  type: string
                  pattern: "^[a-z][a-z0-9-]*$"
                  description: "Ensure agent is in chain"

              anyOf:
                - required: ["set_primary"]
                - required: ["add_to_chain"]
                - required: ["require_agent"]

            reason:
              type: string
              description: "Human-readable explanation for this rule"

        description: "Override rules that take precedence over graph-based routing"

      # Chain extension rules - add agents based on conditions
      chain_extensions:
        type: array
        items:
          type: object
          required:
            - name
            - condition
            - action
          properties:
            name:
              type: string
              pattern: "^[a-z][a-z0-9-]*$"

            condition:
              $ref: "#/$defs/condition"

            action:
              type: object
              properties:
                add_to_chain:
                  type: string
                  pattern: "^[a-z][a-z0-9-]*$"

                position:
                  type: string
                  enum:
                    - first
                    - after_primary
                    - before_last
                    - last
                  default: before_last

                ensure_in_chain:
                  type: array
                  items:
                    type: string
                    pattern: "^[a-z][a-z0-9-]*$"
                  description: "Ensure these agents are in the chain"

              anyOf:
                - required: ["add_to_chain"]
                - required: ["ensure_in_chain"]

        description: "Rules for extending the agent chain"

      # Selection heuristics - how to choose between multiple matching agents
      selection:
        type: array
        items:
          type: object
          required:
            - name
            - description
            - strategy
          properties:
            name:
              type: string
              pattern: "^[a-z][a-z0-9-]*$"

            description:
              type: string

            when:
              type: string
              enum:
                - multiple_agents_match
                - no_exact_match
                - ambiguous_domain
              description: "When to apply this heuristic"

            strategy:
              type: string
              description: "Selection strategy (can be multi-line)"
              examples:
                - |
                  1. skill_match_count (prefer more matches)
                  2. primary_skill_match (bonus for primary skill)
                  3. recent_success_rate (optional)

        description: "Heuristics for agent selection"

# Reusable condition schema
$defs:
  condition:
    type: object
    description: "Condition for rule evaluation"
    properties:
      task_type:
        oneOf:
          - type: string
          - type: array
            items:
              type: string
        description: "Match task type(s)"

      domain:
        oneOf:
          - type: string
          - type: array
            items:
              type: string
        description: "Match domain(s)"

      has_keyword:
        type: array
        items:
          type: string
        description: "Match if any keyword present"

      file_pattern:
        type: array
        items:
          type: string
        description: "Match file patterns (glob)"

      any:
        type: array
        items:
          $ref: "#/$defs/condition"
        description: "OR - match if any sub-condition matches"

      all:
        type: array
        items:
          $ref: "#/$defs/condition"
        description: "AND - match if all sub-conditions match"

      not:
        $ref: "#/$defs/condition"
        description: "NOT - negate sub-condition"

    anyOf:
      - required: ["task_type"]
      - required: ["domain"]
      - required: ["has_keyword"]
      - required: ["file_pattern"]
      - required: ["any"]
      - required: ["all"]
      - required: ["not"]

additionalProperties: false
