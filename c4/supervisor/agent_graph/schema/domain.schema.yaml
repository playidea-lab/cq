$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://c4.dev/schema/domain.schema.yaml"
title: "Domain Definition"
description: "Defines a problem domain with required skills and workflows"
type: object

required:
  - domain

properties:
  domain:
    type: object
    required:
      - id
      - name
      - description
      - required_skills
      - workflow

    properties:
      id:
        type: string
        pattern: "^[a-z][a-z0-9-]*$"
        description: "Unique identifier for the domain (kebab-case)"
        examples:
          - "web-frontend"
          - "data-science"
          - "devops"

      name:
        type: string
        minLength: 1
        maxLength: 100
        description: "Human-readable name of the domain"
        examples:
          - "Web Frontend Development"
          - "Data Science & ML"

      description:
        type: string
        minLength: 10
        maxLength: 500
        description: "Detailed description of this domain"

      required_skills:
        type: object
        description: "Skills needed for this domain"
        required:
          - core
        properties:
          core:
            type: array
            minItems: 1
            items:
              type: string
              pattern: "^[a-z][a-z0-9-]*$"
            description: "Essential skills for this domain"

          optional:
            type: array
            items:
              type: string
              pattern: "^[a-z][a-z0-9-]*$"
            description: "Nice-to-have skills"

      workflow:
        type: array
        minItems: 1
        items:
          type: object
          required:
            - step
            - role
            - select
            - purpose
          properties:
            step:
              type: integer
              minimum: 1
              description: "Step number in the workflow"

            role:
              type: string
              enum:
                - primary
                - support
                - quality
                - security
                - infrastructure
                - documentation
              description: "Role of this step in the workflow"

            select:
              type: object
              description: "How to select the agent for this step"
              properties:
                by:
                  type: string
                  enum:
                    - skill
                    - agent
                  description: "Selection method"

                skills:
                  type: array
                  items:
                    type: string
                    pattern: "^[a-z][a-z0-9-]*$"
                  description: "Skills to look for (when by=skill)"

                prefer_agent:
                  type: string
                  pattern: "^[a-z][a-z0-9-]*$"
                  description: "Preferred agent if multiple match"

              anyOf:
                - required: ["by", "skills"]
                - required: ["by", "prefer_agent"]

            purpose:
              type: string
              description: "Purpose of this workflow step"

            condition:
              type: string
              description: "Optional condition for when this step applies"
              examples:
                - "when code_complexity > medium"
                - "when touches_production == true"

        description: "Ordered workflow steps for this domain"

      rules:
        type: array
        items:
          type: object
          required:
            - if
            - then
          properties:
            if:
              type: string
              description: "Condition expression"
              examples:
                - "task_has_keyword(['notebook', 'jupyter'])"
                - "model_type == 'deep-learning'"
            then:
              type: string
              description: "Action to take"
              examples:
                - "ensure_agent(data-scientist)"
                - "add_to_chain(ml-engineer, after=primary)"
        description: "Domain-specific routing rules"

additionalProperties: false
