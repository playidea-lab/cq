rules:
  # 절대적 오버라이드 - 항상 먼저 체크
  overrides:
    - name: debug-always-debugger
      priority: 100
      condition:
        task_type:
          - debug
          - fix-bug
          - debugging
          - hotfix
      action:
        set_primary: debugger
      reason: "디버깅 작업은 항상 debugger가 시작"

    - name: security-critical
      priority: 95
      condition:
        any:
          - has_keyword: [auth, password, token, secret, credential, api-key]
          - file_pattern: ["**/auth/**", "**/security/**", "**/*secret*"]
      action:
        add_to_chain: security-auditor
        position: before_last
      reason: "보안 민감 코드는 반드시 보안 검토"

    - name: performance-critical
      priority: 90
      condition:
        any:
          - task_type: [performance, optimization, profiling]
          - has_keyword: [slow, latency, bottleneck, optimize]
      action:
        set_primary: performance-engineer
      reason: "성능 관련 작업은 performance-engineer가 담당"

    - name: database-specialist
      priority: 85
      condition:
        any:
          - task_type: [database, query, migration]
          - has_keyword: [sql, query, index, schema, migration]
      action:
        set_primary: database-optimizer
      reason: "데이터베이스 작업은 전문가가 담당"

  # 체인 확장 규칙
  chain_extensions:
    - name: api-needs-docs
      condition:
        all:
          - domain: api
          - task_type: [implement, create]
      action:
        add_to_chain: api-documenter
        position: after_primary

    - name: ml-needs-engineer
      condition:
        all:
          - domain: [ml-dl, data-science]
          - has_keyword: [deploy, serving, production]
      action:
        ensure_in_chain:
          - ml-engineer
          - test-automator

    - name: production-needs-security
      condition:
        has_keyword: [production, prod, deploy]
      action:
        add_to_chain: security-auditor
        position: before_last

  # 에이전트 선택 휴리스틱
  selection:
    - name: prefer-specialist
      description: "더 전문화된 에이전트 선호"
      when: multiple_agents_match
      strategy: |
        1. skill_match_count (많을수록 좋음)
        2. primary_skill_match (primary가 매치되면 +2 가중치)
        3. domain_preference (도메인 선호 에이전트 +1 가중치)

    - name: avoid-redundancy
      description: "같은 스킬을 가진 에이전트 중복 방지"
      when: multiple_agents_match
      strategy: |
        if agent_a.skills ⊂ agent_b.skills:
          prefer agent_b (superset has more capabilities)

    - name: fallback-to-general
      description: "매칭 없을 때 general-purpose 사용"
      when: no_exact_match
      strategy: |
        return general-purpose with code-reviewer in chain
