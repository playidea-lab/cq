domain:
  id: web-frontend
  name: "Web Frontend Development"
  description: "React/Vue/CSS, component development, accessibility"

  required_skills:
    core:
      - frontend-development
      - react
      - css
    optional:
      - accessibility
      - responsive-design
      - state-management

  workflow:
    - step: 1
      role: primary
      select:
        by: skill
        skills: [frontend-development, react]
        prefer_agent: frontend-developer
      purpose: "UI component development"

    - step: 2
      role: quality
      select:
        by: skill
        skills: [testing]
        prefer_agent: test-automator
      purpose: "Write tests and verify"

    - step: 3
      role: quality
      select:
        by: skill
        skills: [code-review]
        prefer_agent: code-reviewer
      purpose: "Code review"

  rules:
    - if: "task_has_keyword(['a11y', 'accessibility', 'wcag'])"
      then: "add_to_chain(frontend-developer, with_focus=accessibility)"
    - if: "task_has_keyword(['performance', 'slow', 'optimize'])"
      then: "add_to_chain(performance-engineer, after=primary)"
