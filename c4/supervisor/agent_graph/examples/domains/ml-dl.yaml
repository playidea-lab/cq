domain:
  id: ml-dl
  name: "Machine Learning / Deep Learning"
  description: "ML pipelines, model training, data processing, PyTorch/TensorFlow"

  required_skills:
    core:
      - machine-learning
      - data-analysis
      - python-coding
    optional:
      - deep-learning
      - model-optimization
      - data-engineering

  workflow:
    - step: 1
      role: primary
      select:
        by: skill
        skills: [machine-learning, deep-learning]
        prefer_agent: ml-engineer
      purpose: "Design and train ML models"

    - step: 2
      role: support
      select:
        by: skill
        skills: [python-coding]
        prefer_agent: python-pro
      purpose: "Implement production-ready code"

    - step: 3
      role: quality
      select:
        by: skill
        skills: [testing]
        prefer_agent: test-automator
      purpose: "Write tests and validate model"

  rules:
    - if: "task_has_keyword(['deploy', 'serving', 'production'])"
      then: "add_to_chain(deployment-engineer, after=test-automator)"
    - if: "task_has_keyword(['data', 'pipeline', 'etl'])"
      then: "add_to_chain(data-engineer, before=ml-engineer)"
