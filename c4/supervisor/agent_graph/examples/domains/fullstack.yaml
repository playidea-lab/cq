domain:
  id: fullstack
  name: "Full-stack Development"
  description: "Full-stack: API + Frontend integration"

  required_skills:
    core:
      - api-design
      - frontend-development
      - backend-architecture
    optional:
      - database-design
      - testing

  workflow:
    - step: 1
      role: primary
      select:
        by: skill
        skills: [api-design, backend-architecture]
        prefer_agent: backend-architect
      purpose: "Design API and backend architecture"

    - step: 2
      role: support
      select:
        by: skill
        skills: [frontend-development]
        prefer_agent: frontend-developer
      purpose: "Implement frontend components"

    - step: 3
      role: quality
      select:
        by: skill
        skills: [testing]
        prefer_agent: test-automator
      purpose: "Write integration tests"

    - step: 4
      role: quality
      select:
        by: skill
        skills: [code-review]
        prefer_agent: code-reviewer
      purpose: "Code review"

  rules:
    - if: "task_has_keyword(['auth', 'login', 'security'])"
      then: "add_to_chain(security-auditor, before=code-reviewer)"
    - if: "task_has_keyword(['performance'])"
      then: "add_to_chain(performance-engineer, after=frontend-developer)"
