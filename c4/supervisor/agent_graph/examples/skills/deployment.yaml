skill:
  id: deployment
  name: "Deployment & CI/CD"
  description: "애플리케이션 배포, CI/CD 파이프라인 구축, 컨테이너화, 인프라 자동화"

  impact: critical
  category: operations
  domains:
    - infra
    - devops

  domain_specific:
    infra:
      priority_boost: 0.5
    devops:
      priority_boost: 0.5

  metadata:
    version: "1.0.0"
    author: "c4-team"
    license: MIT
    tags: [deployment, ci-cd, docker, kubernetes, github-actions, infrastructure]

  capabilities:
    - ci-cd-pipeline
    - container-orchestration
    - infrastructure-automation
    - zero-downtime-deployment
    - rollback-strategy
    - blue-green-deployment

  triggers:
    keywords:
      - deploy
      - ci
      - cd
      - pipeline
      - docker
      - kubernetes
      - release
      - github actions
      - workflow
    task_types:
      - deploy
      - ci-cd
      - pipeline
      - release
      - deployment
    file_patterns:
      - "Dockerfile"
      - "docker-compose*.yaml"
      - ".github/workflows/**"
      - "**/k8s/**"
      - "**/.gitlab-ci.yml"

  rules:
    - id: DEP-001
      description: "배포 전 테스트 통과 필수 (CI에서 자동 검증)"
      impact: critical
      example_bad: |
        # .github/workflows/deploy.yml
        jobs:
          deploy:
            steps:
              - run: ./deploy.sh  # 테스트 없이 바로 배포
      example_good: |
        # .github/workflows/deploy.yml
        jobs:
          test:
            steps:
              - run: npm test
          deploy:
            needs: test  # 테스트 통과 후 배포
            steps:
              - run: ./deploy.sh

    - id: DEP-002
      description: "프로덕션 배포는 항상 롤백 계획 수립 후 진행"
      impact: critical
      example_bad: |
        kubectl apply -f deployment.yaml  # 롤백 고려 없음
      example_good: |
        # 배포 전 현재 상태 기록
        kubectl rollout history deployment/app

        # 배포
        kubectl apply -f deployment.yaml

        # 문제 시 롤백
        kubectl rollout undo deployment/app

    - id: DEP-003
      description: "환경별 설정은 환경 변수 또는 설정 파일로 분리"
      impact: high
      example_bad: |
        # 코드에 하드코딩
        DATABASE_URL = "postgres://prod-server/db"
      example_good: |
        # 환경 변수 사용
        DATABASE_URL = os.environ.get("DATABASE_URL")

        # 또는 설정 파일 분리
        # config/
        #   development.yaml
        #   staging.yaml
        #   production.yaml

    - id: DEP-004
      description: "시크릿은 코드에 포함하지 않고 별도 관리 (Secret Manager, Vault)"
      impact: critical
      example_bad: |
        # docker-compose.yml
        environment:
          - API_KEY=sk-1234567890
      example_good: |
        # docker-compose.yml
        environment:
          - API_KEY=${API_KEY}  # 외부에서 주입

        # 또는 Secret Manager 사용
        # AWS Secrets Manager, HashiCorp Vault, K8s Secrets

  dependencies:
    required:
      - testing

  tools:
    - docker
    - kubernetes
    - github-actions
    - terraform
    - helm
    - argocd

  complementary_skills:
    - container-orchestration
    - monitoring
    - security-scanning

  prerequisites:
    - testing

  leads_to:
    - monitoring
