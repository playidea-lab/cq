skill:
  id: api-design
  name: "API Design & Architecture"
  description: "REST/GraphQL API 설계, OpenAPI 스펙 작성, 버저닝 전략, 인증/인가 설계"

  impact: high
  category: architecture
  domains:
    - web-backend
    - api

  domain_specific:
    web-backend:
      priority_boost: 0.4
    api:
      priority_boost: 0.5

  metadata:
    version: "1.0.0"
    author: "c4-team"
    license: MIT
    tags: [api, rest, graphql, openapi, swagger, design]

  capabilities:
    - rest-api-design
    - graphql-schema
    - openapi-spec
    - api-versioning
    - authentication-design
    - rate-limiting

  triggers:
    keywords:
      - api
      - endpoint
      - rest
      - graphql
      - swagger
      - openapi
      - route
      - controller
    task_types:
      - api-design
      - api-implement
      - api
    file_patterns:
      - "**/api/**"
      - "*.openapi.yaml"
      - "**/routes/**"
      - "**/controllers/**"

  rules:
    - id: API-001
      description: "RESTful 리소스 명명: 복수형 명사 사용, 동사 금지"
      impact: high
      example_bad: |
        GET /getUser/123
        POST /createUser
        DELETE /deleteUser/123
      example_good: |
        GET /users/123
        POST /users
        DELETE /users/123

    - id: API-002
      description: "API 버저닝은 URL 또는 헤더에 명시적으로 포함"
      impact: critical
      example_bad: |
        GET /users/123  # 버전 정보 없음
      example_good: |
        GET /v1/users/123  # URL 버저닝
        # 또는
        GET /users/123
        Accept: application/vnd.api+json; version=1  # 헤더 버저닝

    - id: API-003
      description: "에러 응답은 일관된 구조와 적절한 HTTP 상태 코드 사용"
      impact: high
      example_bad: |
        # 200 OK
        {"error": "User not found"}
      example_good: |
        # 404 Not Found
        {
          "error": {
            "code": "USER_NOT_FOUND",
            "message": "User with ID 123 not found",
            "details": {"user_id": 123}
          }
        }

    - id: API-004
      description: "페이지네이션은 cursor 또는 offset 기반으로 일관되게 구현"
      impact: medium
      example_bad: |
        GET /users?page=5  # 불명확한 페이지네이션
      example_good: |
        # Cursor 기반
        GET /users?cursor=abc123&limit=20
        Response: {"data": [...], "next_cursor": "def456"}

        # Offset 기반
        GET /users?offset=100&limit=20
        Response: {"data": [...], "total": 500, "offset": 100}

  tools:
    - openapi-generator
    - swagger-ui
    - postman
    - insomnia

  complementary_skills:
    - authentication
    - database-optimization
    - error-handling

  leads_to:
    - testing
    - deployment
