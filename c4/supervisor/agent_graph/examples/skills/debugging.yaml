skill:
  id: debugging
  name: "Debugging & Error Analysis"
  description: "버그 식별, 루트 원인 분석, 에러 트레이싱, 스택 분석을 통한 문제 해결"

  impact: high
  category: quality
  domains:
    - universal

  metadata:
    version: "1.0.0"
    author: "c4-team"
    license: MIT
    tags: [debugging, error-analysis, troubleshooting]

  capabilities:
    - error-tracing
    - stack-analysis
    - breakpoint-debugging
    - log-analysis
    - memory-debugging

  triggers:
    keywords:
      - bug
      - error
      - crash
      - exception
      - fix
      - broken
      - failing
    task_types:
      - debug
      - fix-bug
      - debugging
      - hotfix
    file_patterns:
      - "*.log"
      - "*.trace"
      - "**/errors/**"

  rules:
    - id: DBG-001
      description: "문제 재현 단계를 먼저 명확히 정의한 후 디버깅 시작"
      impact: high
      example_bad: |
        # 재현 단계 없이 바로 코드 수정 시도
        # "아마 여기가 문제일 것 같아"
      example_good: |
        # 1. 재현 단계 정의
        # 2. 최소 재현 케이스 작성
        # 3. 디버그 모드로 실행
        # 4. 루트 원인 파악 후 수정

    - id: DBG-002
      description: "디버그 로그는 개발 환경에서만 활성화되도록 설정"
      impact: medium
      example_bad: |
        print(f"DEBUG: user_data = {user_data}")  # 프로덕션에 노출 위험
      example_good: |
        logger.debug(f"user_data = {user_data}")  # 로그 레벨로 제어

  tools:
    - debugger
    - profiler
    - logger

  complementary_skills:
    - profiling
    - logging
    - testing
    - error-handling

  leads_to:
    - testing
    - code-review
