# Round 2 — Experiment: Codebook Utilization 분석 (Option C)
name: exp_codebook_analysis
round: 2
hypothesis: "baseline(STE)와 SimVQ의 실제 codebook utilization 차이가 유의미한지 측정.
  차이가 작다면 collapse 자체가 문제가 아니었음을 확인"
priority: 1  # B보다 먼저 실행 (분석→결론 후 B 반영)
type: analysis  # training 없음, 분석만

# 구현 불필요 — 기존 checkpoint로 바로 실행 가능
blocked_by: []

command: |
  cd /home/pi/git/hmr_unified && uv run python3 - << 'PYEOF'
  import torch, numpy as np, json
  from pathlib import Path

  results = {}

  # 1. baseline (STE) checkpoint 찾기
  ste_candidates = list(Path("external/Mesh-VQ-VAE/checkpoint/MESH_VQVAE").glob("**/model_best_v2v"))
  ste_candidates += list(Path("external/Mesh-VQ-VAE/checkpoint/MESH_VQVAE").glob("**/model_best_loss"))
  ste_ckpt = sorted(ste_candidates)[-1] if ste_candidates else None

  # 2. SimVQ checkpoint 찾기
  simvq_candidates = list(Path("external/Mesh-VQ-VAE/checkpoint/MESH_VQVAE").glob("**/model_best_v2v"))
  simvq_ckpt = sorted(simvq_candidates)[-1] if simvq_candidates else None

  def measure_codebook_util(ckpt_path):
      if not ckpt_path or not Path(ckpt_path).exists():
          return {"error": f"checkpoint not found: {ckpt_path}"}
      ckpt = torch.load(ckpt_path, map_location="cpu", weights_only=False)
      # state_dict 안에서 codebook embedding 찾기
      sd = ckpt.get("state_dict", ckpt.get("model_state_dict", ckpt))
      codebook_keys = [k for k in sd if "codebook" in k.lower() or "embedding" in k.lower()]
      info = {"checkpoint": str(ckpt_path), "codebook_keys": codebook_keys[:5]}
      # usage count 있으면 추출
      for k in sd:
          if "usage" in k.lower() or "count" in k.lower():
              v = sd[k]
              if hasattr(v, "shape"):
                  n_codes = v.shape[0]
                  n_used = int((v > 0).sum().item()) if v.dtype in [torch.int32, torch.int64, torch.float32] else "?"
                  info["n_codes"] = n_codes
                  info["n_used"] = n_used
                  info["utilization"] = round(n_used / n_codes, 4) if isinstance(n_used, int) else "?"
      # exp_simvq 결과에서도 시도
      exp_json = Path("experiments/paper1/exp_simvq/eval_exp056_results.json")
      if exp_json.exists():
          info["eval_results"] = json.load(exp_json.open())
      return info

  print("[C9-START] exp_codebook_analysis")
  results["ste"] = measure_codebook_util(ste_ckpt)
  results["simvq"] = measure_codebook_util(simvq_ckpt)

  # 3. aux latent 통계
  for latent_name, path in [
      ("baseline_pca128", "data/aux_latent/3dpw_test_pca128_latent.npz"),
      ("simvq_486", "data/aux_latent/3dpw_simvq_latent.npz"),
  ]:
      p = Path(path)
      if p.exists():
          data = np.load(p)
          key = list(data.keys())[0]
          arr = data[key]
          results[f"latent_{latent_name}"] = {
              "shape": list(arr.shape),
              "mean": float(arr.mean()),
              "std": float(arr.std()),
              "sparsity": float((arr == 0).mean()),
          }

  out_path = Path("experiments/paper1/exp_codebook_analysis")
  out_path.mkdir(parents=True, exist_ok=True)
  json.dump(results, open(out_path / "analysis_results.json", "w"), indent=2)

  print(json.dumps(results, indent=2))
  print("[C9-DONE] exp_codebook_analysis")
  PYEOF

report:
  start_marker: "[C9-START] exp_codebook_analysis"
  done_marker: "[C9-DONE] exp_codebook_analysis"
  blocked_marker: "[C9-BLOCKED]"
  output_file: "experiments/paper1/exp_codebook_analysis/analysis_results.json"

requires_gpu: false
estimated_time_min: 5
