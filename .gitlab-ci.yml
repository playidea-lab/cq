# GitLab CI — CQ Binary Release Pipeline
#
# Triggers on version tags (v*). Builds 9 binaries across 3 tiers × 3 platforms,
# then uploads all artifacts to PlayIdea-Lab/cq GitHub Releases.
#
# Required CI variable (Settings → CI/CD → Variables):
#   GH_TOKEN         — GitHub PAT with `repo` scope for PlayIdea-Lab/cq
#                      Mark as "Protected" so it's only available on protected tags.
#   CI_SUPABASE_URL  — Supabase project URL (e.g. https://xxx.supabase.co)
#                      Embedded in release binaries so `cq auth login` works out of the box.
#   CI_SUPABASE_KEY  — Supabase anon key (public, safe to embed; protected by RLS)
#   C5_HUB_URL       — C5 Hub URL (e.g. https://piqsol-c5.fly.dev)
#                      Embedded so hub works without config.yaml hub.url
#   C5_API_KEY       — C5 Hub API key (embedded in c5 binary for worker auth)

variables:
  GIT_SUBMODULE_STRATEGY: recursive

stages:
  - check-env
  - build-c5
  - build
  - release

check-env:
  stage: check-env
  script:
    - 'test -n "$GH_TOKEN" || (echo "GH_TOKEN not set - add it in Settings > CI/CD > Variables" && exit 1)'
    - 'test -n "$CI_SUPABASE_URL" || echo "WARNING: CI_SUPABASE_URL not set - built-in auth will be disabled"'
    - 'test -n "$CI_SUPABASE_KEY" || echo "WARNING: CI_SUPABASE_KEY not set - built-in auth will be disabled"'
    - 'test -n "$C5_HUB_URL" || echo "WARNING: C5_HUB_URL not set - hub will require manual config.yaml setup"'
  only:
    - /^v.*/

# ── build-c5 stage ───────────────────────────────────────────
# Build c5 binary per platform; artifacts passed to build-full-* jobs.

.build-c5-template: &build-c5-template
  stage: build-c5
  script:
    - cd c5
    - C5_VERSION=${CI_COMMIT_TAG:-dev}
    - C5_LDFLAGS="-X main.version=$C5_VERSION"
    - 'test -n "$C5_HUB_URL" && C5_LDFLAGS="$C5_LDFLAGS -X main.builtinServerURL=$C5_HUB_URL" || true'
    - 'test -n "$C5_API_KEY" && C5_LDFLAGS="$C5_LDFLAGS -X main.builtinAPIKey=$C5_API_KEY" || true'
    - GOOS=$GOOS GOARCH=$GOARCH go build -ldflags "$C5_LDFLAGS" -o bin/c5-$GOOS-$GOARCH$EXT ./cmd/c5/
  artifacts:
    paths:
      - c5/bin/
    expire_in: 1 hour
  only:
    - /^v.*/
  needs:
    - check-env

build-c5-linux-amd64:
  <<: *build-c5-template
  variables:
    GOOS: linux
    GOARCH: amd64
    EXT: ""

build-c5-linux-arm64:
  <<: *build-c5-template
  variables:
    GOOS: linux
    GOARCH: arm64
    EXT: ""

build-c5-darwin-arm64:
  <<: *build-c5-template
  variables:
    GOOS: darwin
    GOARCH: arm64
    EXT: ""

# ── build stage templates ─────────────────────────────────────

.build-template: &build-template
  stage: build
  script:
    - cd c4-core
    - make embed-skills
    - make build-cross GOOS=$GOOS GOARCH=$GOARCH TIER=$TIER SUPABASE_URL=$CI_SUPABASE_URL SUPABASE_ANON_KEY=$CI_SUPABASE_KEY HUB_URL=$C5_HUB_URL
  artifacts:
    paths:
      - c4-core/dist/
    expire_in: 1 week
  only:
    - /^v.*/
  needs:
    - check-env

.build-full-template: &build-full-template
  stage: build
  script:
    - cd c4-core
    - make embed-skills
    - make embed-c5 C5_BIN=../c5/bin/c5-$GOOS-$GOARCH$EXT EXT=$EXT
    - make build-cross GOOS=$GOOS GOARCH=$GOARCH TIER=full C5_VERSION=$CI_COMMIT_TAG SUPABASE_URL=$CI_SUPABASE_URL SUPABASE_ANON_KEY=$CI_SUPABASE_KEY HUB_URL=$C5_HUB_URL
  artifacts:
    paths:
      - c4-core/dist/
    expire_in: 1 week
  only:
    - /^v.*/

# ── solo tier ────────────────────────────────────────────────
build-solo-linux-amd64:
  <<: *build-template
  variables:
    GOOS: linux
    GOARCH: amd64
    TIER: solo

build-solo-linux-arm64:
  <<: *build-template
  variables:
    GOOS: linux
    GOARCH: arm64
    TIER: solo

build-solo-darwin-arm64:
  <<: *build-template
  variables:
    GOOS: darwin
    GOARCH: arm64
    TIER: solo

# ── connected tier ───────────────────────────────────────────
build-connected-linux-amd64:
  <<: *build-template
  variables:
    GOOS: linux
    GOARCH: amd64
    TIER: connected

build-connected-linux-arm64:
  <<: *build-template
  variables:
    GOOS: linux
    GOARCH: arm64
    TIER: connected

build-connected-darwin-arm64:
  <<: *build-template
  variables:
    GOOS: darwin
    GOARCH: arm64
    TIER: connected

# ── full tier (needs build-c5 artifacts) ─────────────────────
build-full-linux-amd64:
  <<: *build-full-template
  variables:
    GOOS: linux
    GOARCH: amd64
    EXT: ""
  needs:
    - check-env
    - build-c5-linux-amd64

build-full-linux-arm64:
  <<: *build-full-template
  variables:
    GOOS: linux
    GOARCH: arm64
    EXT: ""
  needs:
    - check-env
    - build-c5-linux-arm64

build-full-darwin-arm64:
  <<: *build-full-template
  variables:
    GOOS: darwin
    GOARCH: arm64
    EXT: ""
  needs:
    - check-env
    - build-c5-darwin-arm64

# ── GitHub Release ───────────────────────────────────────────
release-github:
  stage: release
  script:
    - |
      # Install gh CLI if not available
      if ! command -v gh > /dev/null 2>&1; then
        curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
        echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" > /etc/apt/sources.list.d/github-cli.list
        apt-get update -qq && apt-get install -y gh
      fi
    - |
      # Verify all 9 cq binaries (3 tiers × 3 platforms) are present before uploading
      BINARY_COUNT=$(ls c4-core/dist/ | wc -l | tr -d ' ')
      test "$BINARY_COUNT" = "9" || { echo "Expected 9 binaries, got $BINARY_COUNT"; exit 1; }
    - |
      # Verify all 3 c5 standalone binaries are present
      C5_COUNT=$(ls c5/bin/ | wc -l | tr -d ' ')
      test "$C5_COUNT" = "3" || { echo "Expected 3 c5 binaries, got $C5_COUNT"; exit 1; }
    - |
      # Idempotent release: upload to existing release or create new one
      # Uploads: 9 cq binaries + 3 c5 standalone binaries + install.sh = 13 assets
      if gh release view "$CI_COMMIT_TAG" --repo PlayIdea-Lab/cq > /dev/null 2>&1; then
        echo "Release $CI_COMMIT_TAG already exists — uploading binaries with --clobber"
        gh release upload "$CI_COMMIT_TAG" c4-core/dist/* c5/bin/* c5/install.sh \
          --repo PlayIdea-Lab/cq \
          --clobber
      else
        gh release create "$CI_COMMIT_TAG" c4-core/dist/* c5/bin/* c5/install.sh \
          --repo PlayIdea-Lab/cq \
          --title "$CI_COMMIT_TAG" \
          --notes "Binary release $CI_COMMIT_TAG"
      fi
  needs:
    - build-solo-linux-amd64
    - build-solo-linux-arm64
    - build-solo-darwin-arm64
    - build-connected-linux-amd64
    - build-connected-linux-arm64
    - build-connected-darwin-arm64
    - build-full-linux-amd64
    - build-full-linux-arm64
    - build-full-darwin-arm64
    - build-c5-linux-amd64
    - build-c5-linux-arm64
    - build-c5-darwin-arm64
  only:
    - /^v.*/
