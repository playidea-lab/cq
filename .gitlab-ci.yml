# GitLab CI — CQ Binary Release Pipeline
#
# Triggers on version tags (v*). Builds 3 binaries (3 platforms),
# then uploads to PlayIdea-Lab/cq GitHub Releases.
#
# Required CI variable (Settings → CI/CD → Variables):
#   GH_TOKEN         — GitHub PAT with `repo` scope for PlayIdea-Lab/cq
#   CI_SUPABASE_URL  — Supabase project URL
#   CI_SUPABASE_KEY  — Supabase anon key (safe to embed; protected by RLS)

variables:
  GIT_SUBMODULE_STRATEGY: recursive

stages:
  - check-env
  - build
  - release

check-env:
  stage: check-env
  script:
    - 'test -n "$GH_TOKEN" || (echo "GH_TOKEN not set" && exit 1)'
    - 'test -n "$CI_SUPABASE_URL" || echo "WARNING: CI_SUPABASE_URL not set"'
    - 'test -n "$CI_SUPABASE_KEY" || echo "WARNING: CI_SUPABASE_KEY not set"'
  only:
    - /^v.*/

.build-template: &build-template
  stage: build
  script:
    - cd c4-core
    - make embed-skills
    - make build-cross GOOS=$GOOS GOARCH=$GOARCH SUPABASE_URL=$CI_SUPABASE_URL SUPABASE_ANON_KEY=$CI_SUPABASE_KEY
  artifacts:
    paths:
      - c4-core/dist/
    expire_in: 1 week
  only:
    - /^v.*/
  needs:
    - check-env

build-linux-amd64:
  <<: *build-template
  variables:
    GOOS: linux
    GOARCH: amd64

build-linux-arm64:
  <<: *build-template
  variables:
    GOOS: linux
    GOARCH: arm64

build-darwin-arm64:
  <<: *build-template
  variables:
    GOOS: darwin
    GOARCH: arm64

release-github:
  stage: release
  script:
    - |
      if ! command -v gh > /dev/null 2>&1; then
        curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
        echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" > /etc/apt/sources.list.d/github-cli.list
        apt-get update -qq && apt-get install -y gh
      fi
    - |
      BINARY_COUNT=$(ls c4-core/dist/ | wc -l | tr -d ' ')
      test "$BINARY_COUNT" = "3" || { echo "Expected 3 binaries, got $BINARY_COUNT"; ls c4-core/dist/; exit 1; }
    - |
      if gh release view "$CI_COMMIT_TAG" --repo PlayIdea-Lab/cq > /dev/null 2>&1; then
        gh release upload "$CI_COMMIT_TAG" c4-core/dist/* user/install.sh \
          --repo PlayIdea-Lab/cq --clobber
      else
        gh release create "$CI_COMMIT_TAG" c4-core/dist/* user/install.sh \
          --repo PlayIdea-Lab/cq \
          --title "$CI_COMMIT_TAG" \
          --notes "Binary release $CI_COMMIT_TAG"
      fi
  needs:
    - build-linux-amd64
    - build-linux-arm64
    - build-darwin-arm64
  only:
    - /^v.*/
