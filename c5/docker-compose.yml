# C5 Hub — Docker Compose
#
# Start:  docker compose up -d
# Stop:   docker compose down
# Logs:   docker compose logs -f c5-hub
# Reset:  docker compose down -v

version: "3.8"

services:
  c5-hub:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${C5_PORT:-8585}:8585"
    volumes:
      - c5-data:/data
    environment:
      - C5_PORT=${C5_PORT:-8585}
      - C5_API_KEY=${C5_API_KEY:-}
      - C5_DATA_DIR=/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8585/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  c5-data:
