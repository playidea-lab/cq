# C4 Cloud Worker - Fly.io Configuration
# Deploy with: fly deploy --config infra/workers/fly.toml

app = "c4-worker"
primary_region = "nrt"  # Tokyo - closest to Korea

[build]
  dockerfile = "Dockerfile"

[env]
  C4_CLOUD_WORKER = "1"
  C4_WORKER_MODE = "remote"
  LOG_LEVEL = "INFO"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true   # Scale to zero when idle
  auto_start_machines = true  # Start on demand
  min_machines_running = 0    # Allow complete scale-down

[http_service.concurrency]
  type = "requests"
  hard_limit = 1      # One task per machine
  soft_limit = 1

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512

# Scale based on queue depth
[http_service.machine_checks]
  image = "flyio/curl"
  entrypoint = ["/usr/bin/curl"]
  command = ["http://localhost:8080/health"]
  interval = "30s"
  timeout = "5s"
  grace_period = "10s"

# Secrets (set via fly secrets set)
# FLY_API_TOKEN - Fly.io API token
# SUPABASE_URL - Supabase project URL  
# SUPABASE_KEY - Supabase service key
# GITHUB_TOKEN - GitHub API token (for repo access)
