# C4 Keycloak Identity Provider
# Docker Compose configuration for local development and production
#
# Usage:
#   Development: docker compose up -d
#   Production:  docker compose --profile production up -d
#
# Admin Console: http://localhost:8080/admin
# Default credentials: admin / admin (change in production!)

services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: c4-keycloak
    command:
      - start-dev
      - --import-realm
    environment:
      # Admin credentials (override in production)
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_ADMIN_USER:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD:-admin}

      # Database configuration
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: ${POSTGRES_USER:-keycloak}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-keycloak}

      # Hostname configuration
      KC_HOSTNAME: ${KC_HOSTNAME:-localhost}
      KC_HOSTNAME_PORT: ${KC_HOSTNAME_PORT:-8080}
      KC_HOSTNAME_STRICT: false
      KC_HOSTNAME_STRICT_HTTPS: false

      # Health and metrics
      KC_HEALTH_ENABLED: true
      KC_METRICS_ENABLED: true

      # Logging
      KC_LOG_LEVEL: ${KC_LOG_LEVEL:-INFO}
    ports:
      - "${KC_PORT:-8080}:8080"
    volumes:
      - ./realm-config:/opt/keycloak/data/import:ro
    depends_on:
      keycloak-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - c4-network
    restart: unless-stopped

  keycloak-db:
    image: postgres:16-alpine
    container_name: c4-keycloak-db
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: ${POSTGRES_USER:-keycloak}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-keycloak}
    volumes:
      - keycloak-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-keycloak} -d keycloak"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - c4-network
    restart: unless-stopped

  # Production profile with HTTPS support
  keycloak-prod:
    image: quay.io/keycloak/keycloak:26.0
    container_name: c4-keycloak-prod
    profiles:
      - production
    command:
      - start
      - --import-realm
      - --optimized
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_ADMIN_USER}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: ${POSTGRES_USER}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KC_HOSTNAME: ${KC_HOSTNAME}
      KC_HTTPS_CERTIFICATE_FILE: /opt/keycloak/conf/server.crt.pem
      KC_HTTPS_CERTIFICATE_KEY_FILE: /opt/keycloak/conf/server.key.pem
      KC_HEALTH_ENABLED: true
      KC_METRICS_ENABLED: true
      KC_PROXY_HEADERS: xforwarded
    ports:
      - "${KC_PORT:-8443}:8443"
    volumes:
      - ./realm-config:/opt/keycloak/data/import:ro
      - ./certs:/opt/keycloak/conf:ro
    depends_on:
      keycloak-db:
        condition: service_healthy
    networks:
      - c4-network
    restart: unless-stopped

networks:
  c4-network:
    name: c4-network
    driver: bridge

volumes:
  keycloak-db-data:
    name: c4-keycloak-db-data
